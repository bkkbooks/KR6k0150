body:
  text: 福州鼓山嗣祖沙門元賢述諸大德是眾學法半月半月說戒經中來眾學者梵語式叉迦羅尼此云應當學此戒輕微難持易犯為比丘者所當學也又名突吉羅此云惡作謂失威儀皆惡也又此戒分二身上犯者名惡作口上犯者名惡說當齊整着涅槃僧應當學六群比丘着涅槃僧或高褰齊膝或下繫下或垂前一角如象鼻或垂前二葉如多羅樹葉或繞腰襵如國王大臣等居士譏嫌佛聞故制若故作者犯應懺突吉羅以是非威儀突吉羅不故作者犯責心懺突吉羅比丘尼及式叉摩那等犯者俱突吉羅或有如是病或有作務時或在僧伽藍內或在村外道行時不犯當齊整着三衣應當學六群比丘着三衣或高或下等佛聞故制犯不犯俱同上不得反抄衣入白衣舍應當學六群反抄衣行入白衣舍居士譏嫌佛聞故制反抄衣者或左或右反抄衣着肩上也犯者同上不得反抄衣入白衣舍坐應當學因上并制不得衣纏頸入白衣舍應當學六群以衣纏頸入白衣舍居士譏嫌佛聞故判纏頸者總捉衣兩角着左肩上也犯者同上不得衣纏頸入白衣舍坐應當學因上并制不得覆頭入白衣舍應當學六群以衣覆頭入白衣舍居士譏其如賊盜佛聞故制覆者或以衣及樹葉等覆犯皆同上若頭有病覆者不犯或有難覆頭而走不犯不得覆頭入白衣舍坐應當學因上并制不得跳行入白衣舍應當學六群跳行入白衣舍居士譏其如鳥佛聞故制犯者同上若為人所打若有賊惡獸等難跳行而走若有棘刺或渡渠渡坑渡水泥等跳過不犯不得跳行入白衣舍坐應當學因上并制不得蹲坐白衣舍內應當學六群赴食到白衣家蹲坐比丘以手觸之即倒地露形居士譏其如裸形外道佛聞故制蹲者或在床或在地尻不至地也犯者同上若尻邊病不能坐者不犯不得手扠腰行入白衣舍應當學六群手扠腰行入白夜舍居士譏其如新娶得意之狀佛聞故制犯者同上不得手扠腰行入白衣舍坐應當學因上并制不後搖身行入白衣舍應當學六群搖身行入白衣舍居士見之譏其如國王大臣等佛聞故制犯者同上不得搖身行入白衣舍坐應當學因上并制不得掉臂行入白衣舍應當學六群掉臂行入白衣舍居士譏其如國王大臣等佛聞故制掉臂者垂臂而行成前或却也犯者同上不犯者或有事難逃走等或渡河水跳坑壍等不犯不得掉臂行入白衣舍坐應當學因上并制好覆身入白衣舍應當學六群不好覆身處處現露居士譏嫌謂如婆羅門等佛聞故制犯者同上若被風吹離體及被人所縛無犯好覆身入白衣舍坐應當學因上并制不得左右顧視行入白衣舍應當學六群左右顧視行入白衣舍居士譏其如賊竊人佛聞故制犯者同上或有難欲求方便逃走或有所尋覔不犯不得左右顧視行入白衣舍坐應當學因上并制靜默入白衣舍應當學六群高聲大喚入白衣舍居士譏其如婆羅門佛聞故制犯者同上若聾不聞聲者或遠有所呼喚者或有難高聲而走者不犯靜默入白衣舍坐應當學因上并制不得戲咲入白衣舍應當學六群戲咲入白衣舍居士譏其如獼猴佛聞故制犯者同上或念法歡喜而咲者不犯不得戲咲入白衣舍坐應當學因上并制用意受食應當學六群在白衣家受食居士自行斟酌六群不用意受食損棄羮飯居士譏其貪心受食如穀貴饑餓時佛聞故制犯者同上或鉢小故有遺落不犯平鉢受食應當學六群赴供溢鉢受食遺棄羮飯居士譏其如饑餓人佛聞故制平鉢者受食不可過滿也犯者同上或鉢小故滿者不犯平鉢受羮應當學六群赴齋鉢中受飯多故不能受羮居士見亦譏嫌佛聞故制犯者同上羮飯俱食應當學六群赴齋飯至羮未至飯已盡羮至飯未至羮已盡居士見亦譏嫌佛聞故制俱食者俟羮飯俱到方食也犯者同上或時欲過或有事難或時需羮不需飯或時需飯不需羮不犯以次食應當學六群赴齋不從鉢中次第食乃處處取食居士譏其如狗猪等佛聞故制犯者同上或患熱挑取冷處食不犯不得挑鉢中央食應當學六群受食挑鉢中央令空居士譏嫌佛聞故制犯者同上或患熱開中僧令冷不犯無病不得為己索羮飯應當學六群在白衣家為己索羮飯居士譏嫌佛聞故制犯者同上或病為己索或為病人索不犯不得以飯覆羮更望得應當學六群在居士家受食居士已與羮彼即以飯覆羮望更得居士問言羮在何處彼默然居士嫌責言如饑餓人佛聞故制犯者同上若請食羮汙衣等宜覆以飯不犯不得視比坐鉢中起嫌心應當學六群在居士家受食見自鉢中分少見比坐鉢中分多便言居士有愛憎不平等眾皆呵責佛聞故制犯者同上若比坐病或眼昏為看得食不得食淨不淨者不犯當繫鉢想食應當學六群受羮而左右顧視比坐取其羮藏之不覺乃問比坐我羮在何處眾皆譏嫌佛聞故制犯者同上若比坐病或眼昏看得食不得食等不犯不得大摶飯食應當學六群受供大摶飯食居士譏嫌佛聞故制犯者同上若日將過中或有事難欲疾食者不犯不得大張口待飯食應當學六群摶飯未至先大張口待食居士譏嫌佛聞故制犯者同上不得含食語應當學六群受食含飯而語居士譏嫌佛聞故制犯者同上或有急事不犯不得摶飯遙擲口中應當學六群受食乃摶飯遙擲口中居士譏其如幻師佛聞故制犯者同上或被執縛手不至口遙擲而食不犯不得遺落飯食應當學六群受食不如法以手摶飯齧遺落者多居士譏其如鳥等佛聞故制犯者同上或手有病不犯不得頰飯食應當學六群大口受食兩頰鼓起如獼猴狀居士譏嫌佛聞故制犯者同上若日將過中或有事難欲疾食者不犯不得嚼飯作聲應當學六群受食嚼飯作聲居士譏嫌佛聞故制犯者同上若嚼乾餅燋飯瓜果等不犯不得大噏飯食應當學六群受供乃大噏飯食居士譏嫌佛聞故制大噏飯者張口遙呼噏也犯者同上若口痛或食羮等無犯不得舌䑛食應當學六群受供乃吐舌取食居士譏嫌佛聞故制犯者同上不得振手食應當學六群赴供振手而食居士譏嫌佛聞故制振手者手搖動也犯者同上或有如是病不犯不得手把散飯食應當學六群在居士家以手棄散飯而食居士譏其如鷄鳥等佛聞故制犯者同上若食有虫及有他點汙散去不犯不得污手捉食器應當學六群以不淨膩手捉器而飲居士譏嫌佛聞故制犯者同上或草上受葉上受不犯不得洗鉢水棄白衣舍內應當學六群在居士家食已洗鉢棄洗鉢水于地餘食狼藉居士嫌責佛聞故制犯者同上若以器承持棄于外或問主人有可棄之處不犯不得生草菜上大小便涕唾除病應當學六群于生草菜上大小便涕唾居士譏嫌佛聞故制病者開許犯者同上若于無草菜上便流入草菜上不犯不得淨水中大小便涕唾除病應當學六群于淨水中大小便涕唾居士見之譏嫌佛聞故制以不淨之物汙其淨於理不可也病者不能遠行故開犯者同上若在不淨水中不犯不得立大小便除病應當學六群立大小便為居士所嫌佛聞故制病者不能蹲故開犯者同上此方小便皆立不犯不得為反抄衣不敬人說法除病應當學六群與反抄衣不恭敬人說法眾比丘譏嫌佛聞故制病者開許犯者同上若王大臣等可與略說但不宜廣說智者當自知時不得為衣纏頸人說法除病應當學不得為覆頭人說法除病應當學不得為裹頭人說法除病應當學不得為手扠腰人說法除病應當學不得為着革屣人說法除病應當學不得為着木屐人說法除病應當學不得為騎乘人說法除病應當學右七條皆因上并制犯不犯俱同上不得在佛塔內止宿除為守護故應當學六群在佛塔內止宿眾比丘嫌責佛聞故制後比丘不敢守護佛塔故開許犯者同上或為勢力所持不犯今佛殿經閣等即同塔論不得佛塔內藏財物除為堅牢故應當學六群藏財物於佛塔中比丘嫌責佛聞故制後僧中有財物藏宜堅牢者不敢藏白佛聽許犯者同上或為勢力所持不犯不得着革屣入佛塔中應當學六群着革屣入佛塔眾見嫌責佛聞故制犯者同上又佛一日從定起露地經行時諸比丘著革屣隨佛經行佛顧視言外道弟子敬重師故不著革屣隨師經行何況多陀阿伽陀從今佛前和尚前阿闍黎前俱不應着着得突吉羅罪不得手捉革屣入佛塔中應當學不得着革屣繞佛塔行應當學不得着富羅入佛塔中應當學不得捉富羅入佛塔中應當學右四條俱因上并制富羅梵語正言腹羅此云短靿靴也犯不犯俱同上不得塔下坐食留革及食汙地應當學六群塔下坐食食已留草及食汙地不掃而去比丘嫌責佛聞故制犯者同上若有殘食及草佛聽着脚邊出時持棄之不犯不得擔死屍從塔下過應當學六群擔死屍從塔下過熏穢觸塔護塔神嗔比丘嫌責佛知故制犯者同上若路所必由或為勢力所強不犯不得塔下埋死屍應當學不得塔下燒死屍應當學不得向塔前燒死屍應當學不得繞塔四邊燒死屍使臭氣來入應當學右四條俱因上并制燒屍若在遠處臭氣不入者不犯不得持死人衣及床從塔下過除浣染香熏應當學六群持死人衣及床從塔下過臭氣觸佛塔護塔神嗔佛知故制犯者同上若浣染香熏過者不犯不得佛塔下大小便應當學不得向佛塔大小便應當學不得遶佛塔四邊大小便使臭氣來入應當學不得持佛像至大小便處應當學右四條俱因上并制以大小便臭穢所觸即同死人衣等也佛像不可持至大小便處或路必由中者或強力所持者不犯不得佛塔下嚼揚枝應當學不得向佛塔嚼揚枝應當學不得遶佛塔四邊嚼揚枝應當學右三條皆以口氣臭穢熏觸所尊亦所不應也故并制之犯者同上又律中云有二染污不得禮佛及和尚阿闍梨一者大便不洗淨二者食後不漱齒不得佛塔下涕唾應當學不得向佛塔涕唾應當學不得繞佛塔四邊涕唾應當學右三條皆以涕唾不淨而汙淨地況近所尊而涕唾不敬孰甚焉故佛因六群而一一制之犯者同上或中間有隔不見者不犯不得向佛塔舒脚坐應當學六群向佛塔舒脚坐諸比丘嫌責佛為制戒犯者同上若中間有隔者不犯跏趺坐者不犯不得安佛塔在下房己在上房住應當學六群安佛塔在下房己在上房住諸比丘嫌責佛因制戒犯者同上或上房有污穢等緣移置下房不犯人坐己立不得為說法除病應當學六群所犯辱法之過佛知故制若為病人說法則聽犯者同上若為王大臣捉去不犯人臥己坐不得為說法除病應當學人在座己在非座不得為說法除病應當學人在高坐己在下座不得為說法除病應當學人在前行己在後行不得為說法除病應當學人在高經行處己在下經行處不得為說法除病應當學人在道己在非道不應為說法除病應當學右六條為重法故一一并制之犯不犯俱同上不得携手在道行應當學六群比丘携手道上行遮他男女居士見之譏嫌佛知故制犯者同上若眼暗或有疾須扶行者俱不犯不得上樹過人頭除時因緣應當學有一比丘在大樹上受夏安居大小便下樹神嗔欲斷其命佛知故制後有比丘路逢惡獸上樹避之不敢過上為惡獸所傷佛乃聽許除時因緣犯者同上佛又制不得繞樹大小便犯者亦突吉羅不得絡囊盛鉢貫杖頭置肩上行應當學䟦難陀以絡囊盛鉢貫杖頭置肩上擔行居士望見不知何人避于下道屏處後見是䟦難陀遂共譏嫌佛聞故制犯者同上人持杖不應為說法除病應當學佛為眾說法波斯匿王來聽其從眾有持杖者六群乃別為說法佛知故制犯者同上若為王大臣等無犯人持劒不應為說法除病應當學人持鉾不應為說法除病應當學人持刀不應為說法除病應當學人持葢不應為說法除病應當學右四條皆匿王從眾有持劒鉾刀葢等故佛一一并制之犯不犯同上諸大德我已說眾學法今問諸大德是中清淨不三說諸大德是中清淨默然故是事如是持諸大德是七滅諍法半月半月說戒經中來若比丘有諍事起即應除滅諍事有四一言諍二覔諍三犯諍四事諍言諍者謂評論不合如是法非法是律非律是麤罪非麤罪乃至是佛說非佛說是佛制非佛制等因此相忿相譏是也覔諍者如比丘問他比丘言汝憶犯某罪不彼比丘不喜不受是也犯諍者如比丘犯波羅夷乃至惡說眾議紛然是也事諍者如僧中一切羯磨一切僧事有所不合者是也若有諍起即當除滅除滅之法凡有七種具在下文應與現前毗尼當與現前毗尼上句是量度其所宜之法下句乃以法治諍也後皆倣此毗尼此云善治亦云滅惡即戒律也現前毗尼通滅諸諍現前有五一法現前二毗尼現前三人現前四僧現前五界現前云何名法現前現持滅諍之法是云何名毗尼現前現持滅諍之毗尼是云何名人現前共諍之人現在是云何名僧現前僧集和合是云何名界現前在界內作制限羯磨者是以此五現前為治其諍如法懺悔而諍事滅矣若更發起者犯波逸提應與憶念毗尼當與憶念毗尼此毗尼正滅覔諍也如比丘被他比丘以無根罪謗實知其不犯而眾中猶說之不已應從僧中乞憶念毗尼又如一比丘犯罪已發露如法懺悔而僧中猶說之不已應從僧中乞憶念毗尼又如一比丘未犯是罪將必當犯僧中說是犯罪問之不已應從僧中乞憶念毗尼凡有乞者僧中應察其戒行果清淨者與之則如法若戒行有缺而妄與則非法也憶念者因其自不憶有罪故令其憶念若有罪則受罰無罪則加勉也與憶念毗尼法彼比丘應到僧中偏袒右肩脫革屣禮僧足胡跪白言我某甲比丘被某甲比丘再三來我所問我汝憶犯某罪不我再三答言不憶今從僧中乞憶念毗尼願僧與我憶念毗尼使彼不復數數問我慈愍故如是三乞已僧應籌量可與者白四羯磨與之一比丘唱言大德僧聽此某甲比丘於僧中乞言彼某甲比丘云云同上至不復數數問我下更云僧今與憶念毗尼使彼比丘不復數數問其罪若僧時到僧忍聽白如是又唱言大德僧聽云云同上至不復問其罪下更云誰諸長老忍者默然誰不忍者說如是三說已即云僧忍與某甲比丘憶念毗尼竟僧忍默然故是事如是持如是滅已若更發起者犯波逸提應與不癡毗尼當與不癡毗尼此毗尼亦滅覔諍也如比丘癡狂失心犯種種罪後不癡諸比丘問汝憶犯某罪不答言不憶乃至三問不已是人應從僧中乞不癡毗尼乞法與法俱同憶念毗尼但改憶念為不癡耳應與自言治當與自言治此法正滅犯諍也自言者有比丘犯波羅夷乃至惡說自來首云我犯某罪或僧為舉問言汝憶犯某罪不彼自言我犯某罪僧中更當審其相果犯某罪則依其自言治之或有犯而言不犯者或有犯重而言犯輕者或有不犯而言犯者或有犯輕而言犯重者皆不應與以非法故若犯罪比丘不自言犯而遽與罪者亦非法以五篇之罪皆依自言治也應與覔罪相當與覔罪相此法一名本言治滅覔諍犯諍也此因犯罪之人語言不一不可依自言治當尋覔其犯罪之相而治之如一比丘被僧舉問言汝憶犯某罪不答言不犯再問答言犯尋復言我實不犯向戲言耳如是比丘當實覔其犯罪之相依其本言治之作罪處所羯磨應與多覔罪相當與多覔罪相此法正滅言諍亦滅事諍犯諍此因事體是非難定輕重難判前諸法不能滅故多覔罪相以滅之多覔有四一多智慧二多人知法三多求因緣四多處求斷多智慧者謂博學多聞律部通利善達開遮心無偏愛也多人知法者謂到多人知法之處行籌決斷也多求因緣者謂廣尋三藏多引因緣以為證據也多處求斷者謂徧到諸剎求斷其事也應與如草覆地當與如草覆地此法正滅犯諍兼滅言諍覔諍事諍以兩黨相傾四諍并起不可窮詰不可除滅佛乃教作如草覆地懺悔如草覆地者兩黨人各心願息諍宜盡到僧中偏袒右肩脫革屣胡跪白言大德僧聽我等共相諍鬪多犯眾罪不得除滅今從僧乞如草覆地懺悔如是三說已皆舒手脚伏地向羯磨師前一心聽受羯磨羯磨師唱言大德僧聽此諸比丘共相鬪諍多犯眾罪不得除滅今從僧乞如草覆地懺悔僧今與如草覆地懺悔若僧時到僧忍聽白如是復唱言大德僧聽今此諸比丘共相鬪諍多犯眾罪不可除滅今從僧乞如草覆地懺悔僧今與諸比丘如草覆地懺悔誰諸長老忍者默然誰不忍者說僧與諸比丘如草覆地懺悔竟僧忍默然故是事如是持是謂如草覆地懺悔法草覆地者表服罪之相此懺悔不說罪原不說罪名僧亦不更問其罪相而受懺也諸大德我已說七滅諍法今問諸大德是中清淨不三說諸大德是中清淨默然故是事如是持諸大德我已說戒經序已說四波羅夷法已說十三僧伽婆尸沙法已說二不定法已說三十尼薩耆波逸提法已說九十波逸提法已說四波羅提提舍尼法已說眾學法已說七滅諍法此是佛所說戒經半月半月說戒經中來若更有餘佛法是中皆共和合應當學此總結上文也更有餘佛法者謂戒僅二百五十而事實無窮其非佛所遮亦非佛所開許者甚眾但能于是戒中參詳其意則無不和合皆所當學也昔佛告比丘或時有事我從先來非遮非許者然于此事若違不清淨順清淨者應可行之若違清淨順不清淨者即不應行今觀佛此囑正所謂是中皆共和合應當學也忍辱第一道佛說無為最出家惱他人不名為沙門前已廣說五篇戒相此後乃七佛所說略教善體此意而行之雖不中不遠矣故一一陳之欲希聖道者必以忍辱為第一何以忍辱為第一以佛道無為必由忍辱而入能忍辱則漸至于忘辱人我之相可空庶幾無為之域根本頌云忍是勤中王能得涅槃處是也若辱不能忍必至惱他豈沙門之法哉沙門此云勤息謂勤修戒定慧息滅貪嗔癡故號為沙門今至于惱他則人我山高鬪諍日起勤息之謂何此是毗婆尸如來無所著等正覺說是戒經毗婆尸一云維衛此翻勝觀梵語多陀阿伽陀此云如來謂如實道而來示生人間化導眾生也梵語阿羅訶此翻無所著亦翻應供謂于世間出世間之法毫無所著堪受九界聖凡之供養也梵語三藐三佛陀此翻等正覺亦翻正徧知謂知無不正亦無不徧悉如法界故此舉佛十號之三也此佛出現于世最初說此戒葢為眾生我相未除必起鬪諍障道之法莫甚于此故首防之譬如明眼人能避險惡道世有聰明人能遠離諸惡此以喻明學道貴有智也無智之人則貪近利信邪法必入三途縱得人天終歸墮落如行路人有足無明必陷于險也有智之人則能辨邪正不為小利所惑故得涅槃安隱之樂如行路人有足有眼必離于險也此是尸棄如來無所著等正覺說是戒經尸棄一云式棄大論翻火依此佛出現于世最初說此戒葢以人無遠識多受外道之法貪人天之樂而不知其患也故說此以儆其迷不謗亦不嫉當奉行于戒飲食知止足常樂在空閑心定樂精進是名諸佛教不謗遮口業不嫉遮意業當奉行于戒則三業俱遮矣然心貪飲食則不能奉戒心戀塵囂則不能奉戒心樂懈怠則不能奉戒故一一言之若能如此則戒可淨而定可得慧可發諸佛之教又有出此者乎此是毗葉羅如來無所著等正覺說是戒經毗葉羅一云毗舍浮此翻徧一切自在此佛出現于世最初說此戒葢因諸弟子好說他過而自懈于進修無由得沙門果故示此對治之法譬如蜂採花不壞色與香但取其味去比丘入聚落不違戾他事不觀作不作但自觀身行若正若不正初一頌前三句是喻後一句法合蜂之採花但輕取其味而色與香俱無所損比丘入聚落亦當如蜂焉雖乞種種物但取充虗而止不可過索而退彼敬信之心也次一頌前二句誡觀他後二句觀自觀謂他人之事不可與他違戾而生訾毀非獨不可違戾亦不可觀其事之能行與不但當自觀己身之所行正與不正正則加勉不正則力改可也此是拘留孫如來無所著等正覺說是戒經拘留孫一云拘留秦䭾此翻所應斷又翻作用此佛出現于世最初說此戒葢因諸弟子多希利養不知止足好談他惡懈于白修故誡之心莫作放逸聖法當勤學如是無憂愁心定入涅槃凡修聖法最忌放逸放逸則百無所成故誡之而勸其勤學也既能勤學則煩惱可斷故曰無憂愁無煩惱則心可定心定則無生聖果可入也此是拘那含牟尼如來無所著等正覺說是戒經拘那含牟尼一云迦那迦牟尼一云羯諾迦牟尼此翻金寂又翻金仙此佛出現于世最初說此戒葢為聲聞之眾躭味小定自生放逸不能進修故說此以䇿進之一切惡莫作當奉行諸善自淨其志意是則諸佛教一切惡莫作者謂性業遮業乃至無量不善法悉禁使斷絕也當奉行諸善者謂六度萬行乃至無量清淨法門悉䇿令修進也自淨其志意者謂惡雖止而意或乍起善雖行而念或難純則此浮情妄想不可不淨況雖止惡而止惡之念未忘雖行善而行善之心未化清淨心中無如是事故亦不可不淨也具此三者則諸佛教法俱不越此故曰是則諸佛教此是迦葉如來無所著等正覺說是戒經迦葉一云迦攝波此翻飲光此佛出現于世最初說此戒此乃諸戒之大綱通行之正軌非特為一時一機而說也善護于口言自淨其志意身莫作諸惡此三業道淨能得如是行是大仙人道世間之業不出口意身三口業謂妄語綺語惡口兩舌及一切非禮之言是也意業謂貪嗔癡及一切妄念是也身業謂殺盜婬及一切目之所視耳之所聽鼻之所嗅舌之所嘗身之所觸起種種過是也若能護此三者不至於犯則戒靡不淨是謂大覺金仙之道也夫修戒止可生天非聖道也然無戒則諸聖道皆不能成故欲求大涅槃者必得此以為之基謂非聖道而何哉此是釋迦如來無所著等正覺於十二年中為無事僧說是戒經從是已後廣分別說諸比丘自為樂法樂沙門者有慚有愧樂學戒者當於中學釋迦牟尼此翻能仁寂默寂默者內冥諦理是自利之智也能仁者外揚仁化是利他之悲也悲智雙運立此嘉稱於十二年下謂彼時僧眾清淨無戒可持無相可制故云無事僧所以不立名相略指大意示之是謂略戒經至十二年後漸有毀犯故世尊隨事立禁廣說戒相令其識相護持防諸有漏也諸比丘下結勸修學謂比丘果爾好樂正法樂作沙門慚愧非法樂學淨戒者當於此伽陀中學也又僧祇律中名此為偈布薩佛住王舍城時有九十六種出家人皆作布薩惟佛不作世人嫌之皆言何釋子獨不布薩耶諸比丘以是白佛佛言正應為世人所嫌從今後應作布薩故說此偈明人能護戒能得三種樂名譽及利養死得生天上當觀如是處有智勤護戒戒淨有智慧便得第一道此明護戒之利益前四句明世間利益謂有智之人識邪正知利害故能嚴護此戒必能得三種樂三種樂者一得名譽謂守戒之人眾共讚揚故二得利養謂守戒之人眾樂供養故三得生天謂守戒之人十善具足死得享天福故後四句明出世利益當觀護戒之得樂如是有智之人益當勤護淨戒戒淨則能生定因定則能發慧既能發慧便可得無上菩提第一之道豈但得世間三種樂而已哉如過去諸佛及以未來者現在諸世尊能勝一切憂皆共尊敬戒此是諸佛法若有自為身欲求於佛道當尊重正法此是諸佛教前六句言三世諸佛皆尊教此戒也勝一切憂者六凡有分段之憂三乘有變易之憂惟佛則五住究盡二死永亡故能勝也三世諸佛已成無上果而猶共尊此戒者何以此戒即是諸佛之正法故若有下言眾生欲求佛道則尤當尊此戒以是佛垂教於後令人依此而修故也七佛為世尊滅除諸結使說是七戒經諸縛得解脫已入于涅槃諸戲永滅盡遵行大仙說聖賢稱譽戒弟子之所行入寂滅涅槃七佛下重引諸佛修證顯持戒之勝功也七佛為滅除諸結使乃說是七戒經此戒即是七佛自修之法諸縛由此而得解脫入于涅槃而一切世間戲論之法永滅而無有餘矣結者九結謂愛恚慢無明見取疑嫉慳也使者見惑有八十八使乃至見諦思惟九十八使也縛者有四謂貪嗔戒取見取也遵行下勸持也言弟子遵行先聖所說之戒乃聖賢之所共稱亦即是弟子所行以入于涅槃之道佛既由此而證弟子可不依而行哉世尊涅槃時興起大悲心集諸比丘眾與如是教誡莫謂我涅槃淨行無人護我今說戒經亦善說毗尼我雖般涅槃當視如世尊此經久住世佛法得熾盛以是熾盛故得入于涅槃此引佛最後垂訓令人尊戒也佛于雙林中將入涅槃時以大悲心廣集法眾謂汝等莫謂我今入滅無人護汝我今說此戒經即與我住世無異汝等當視如世尊尊重而奉行之若尊重則此經得久住世佛法得以熾盛以佛法熾盛人皆奉行則皆得入于涅槃也若不持此戒如所應布薩喻如日沒時世界常暗冥當護持是戒如犛牛愛尾和合一處坐如佛之所說若不下因上文而反顯不持之過謂若不持此戒于半月半月不能如法布薩既無戒日舒光法性界中悉皆冥暗眾生盡沉沒于嶮惡道中也布薩梵語具云鉢羅帝提舍耶𥧌此翻我對設謂相向說罪也當護下言當護戒如犛牛愛尾者言其護之切也犛牛南夷之獸其形如牛而尾有五色行必顧之雖為人所追猶顧不捨因顧其尾為人所獲喻護戒者雖有失命因緣而能不失也和合一處等謂當半月半月共集說戒布薩如佛所說也我已說戒經眾僧布薩竟我今所說經所說諸功德施一切眾生皆共成佛道此頌凡五十六句乃曇無德律師所立大意皆顯揚戒德普勸修持至此前二句乃總結上文後四句乃發願迴向凡一切功德不迴向眾生則局于自利不迴向佛道則止于半途今言施眾生而共成佛道是為第一廣大迴向也
