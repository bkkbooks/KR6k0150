body:
  text: 福州鼓山嗣祖沙門元賢述四分者一比丘戒二比丘尼戒并受戒說戒三安居自恣等四房舍并雜犍度等故名四分犍度此云法聚即分義也戒本乃是初分比丘戒中佛制戒之語半月眾所共誦者也其源出曇無德部曇無德此云法密部主之號也先是佛成道後三十八年赴王舍城國王齋齋畢羅睺羅洗鉢失手墮地碎為五片佛云此表我滅度後諸惡比丘將我律分為五部也後佛滅度百年後有優婆毱多尊者弟子五人各執己見果分律為五部一曇無德部二薩婆多部三迦葉遺部四彌沙塞部五婆蹉富羅部其古律則摩訶僧祇也此本傳至唐凡有四本宣律師所遵行乃姚秦陀施耶舍譯本此本與律少有不同故後有唐西太原寺僧懷素仍於律中撮出俗稱新律新舊二律莫敢低昂請旨欽定二律并行即今藏中二本是也愚詳考之義實無差文有少異今則并用二本參定非敢妄有增損稽首禮諸佛及法比丘僧今演毗尼法令正法久住將說戒經先說此偈是為說戒之序律中全文尚多疑是部主曇無德所說今省繁就要不知何人所刪也首二句歸敬三寶以求冥加次二句明說戒之本意演宣說也毗尼此云律又云善治是以律治罪也令正法久住者以戒為定慧之洪基解脫之要道若不得戒雖有禪定智慧悉成魔外故說戒則正法久住不說則正法不久住也戒如海無涯如寶求無厭欲護聖法財眾集聽我說此歎戒德以勸其聽也戒法廣大猶如大海無有邊涯其可貴重猶如珍寶當勤求之勿生厭倦聖法財即成寶也欲守護此戒不至喪失則當常聽此戒庶常得䇿勵而戒可護也欲除四棄法及滅僧殘法障三十捨墮眾集聽我說此言戒能滅罪以勸其聽也戒若有毀犯當常聽說戒發露懺悔則罪可得滅障謂防障言可防障而不至於墮也戒有五篇今止言三者舉重以該輕耳毗婆尸式棄毗舍拘留孫拘那含牟尼迦葉釋迦文諸世尊大德為我說是事我今欲善說諸賢咸共聽此言戒乃七佛同制非後人妄立故當共聽也譬如人毀足不堪有所涉毀戒亦如是不得生天人欲得生天上若生人中者常當護戒足勿令有毀損如御入險道失轄折軸憂毀戒亦如是死時懷恐懼此設喻以示毀戒之害如人毀足則不可行毀戒則不能生天人欲生天人必須護戒況入聖道乎又如御入險道失轄折軸則險不可出毀戒則惡道不可出臨死時惡相現前必墮三途有深懷恐懼而已是知戒決不可毀也轄車軸頭鐵也如人自炤鏡好醜生欣戚說戒亦如是全毀生憂喜如兩陣共戰勇怯有進退說戒亦如是淨穢生安畏此設喻以示說戒之益如人炤鏡則自見其好醜好則欣而醜則戚說戒則自見其全毀全則喜而毀則憂又如兩陣共戰勇則進而怯則退說戒則淨者安而穢者畏喜與安有增進之意憂與畏有改悔之機是說戒之益有如是也世間王為最眾流海為最眾星月為最眾聖佛為最一切眾律中戒經為上最如來立禁戒半月半月說前重重誡勸已竟此乃較量其勝功以結上文也小乘律中以比丘戒為最故云然由此戒為最故如來立此禁戒使半月半月必說之所以警䇿昏怠而除滅愆尤也和合僧集會答言僧集和合未受具戒者出有即遣出答言未受具戒者已出無答言無未受具戒者不來諸比丘說欲及清淨有依法說無答言無說欲及清淨者誰遣比丘尼來請教誡有依請具答無答言此處無尼來請教誡僧今和合何所作為答言說戒羯磨大德僧聽今白月十五日眾僧說戒若僧時到僧忍聽和合說戒白如是此羯磨軌則也和合者律中云應來者來應與欲者與欲來現前人得呵不呵是名和合反此名不和合集會者律云當敷坐打揵椎三通盡大眾俱集一處未受下律中白衣沙彌俱不許聽大僧說戒聽者得無量罪故遣之不來下律云比丘若有佛法僧事及有病看病人竝聽與欲與欲者聽其與人說欲也惟除結界及鄙事不與欲與者得罪其傳欲人在眾中整儀白云大德一心念今有某甲比丘自說清淨無諸障法為病因緣如法僧事與欲清淨一說便止誰遣下佛以尼眾暗昧又闕于參訪許半月往僧中請教誡師其受囑人當于眾中整儀白云大德僧聽某處和合比丘尼差比丘尼某甲半月頂禮和合僧足求請教誡三說已僧中應為擇教誡師作白差往如無堪者上座應作略教誡法告囑人云明日尼來請可不時報言昨夜為尼遍請無堪者然上座有勅語諸尼眾精勤行道謹慎莫放逸受囑者如法告于來尼尼回集眾宣上座勅已應合掌聽受答言頂戴奉行禮拜而退若尼半月不向僧乞教誡師者犯墮羯磨此云作法辦事乃白眾而作法也大德下正羯磨之語白月黑月者上半月為白月下半月為黑月僧時到謂當作法之時也忍聽謂忍許聽作羯磨也諸大德我今欲說波羅提木叉諸大德諦聽善思念之若自知有犯者即應自懺悔不犯者默然默然者知諸大德清淨若有他問者即應如實答如是諸比丘在大眾中乃至三問憶念有罪不懺悔者得故妄語罪故妄語者佛說是障道法若比丘憶念有罪欲求清淨者當懺悔懺悔得安樂不懺悔罪益深此令其憶念有罪而懺悔也波羅提木叉此云保解脫謂持此戒保任得解脫也又云別解脫謂三業七支因戒防非別別得解脫也若有問者謂此三問之外別有事當眾審問者亦當如實而答也不懺悔得故妄語罪者以其自知有罪而故覆藏雖未有語亦同有罪說無罪虗妄不實是障道法也結突吉羅諸大德我已說戒經序今問諸大德是中清淨不三說諸大德是中清淨默然故是事如是持此上通名戒經序下乃廣說戒相諸大德是四波羅夷法半月半月說戒經中來波羅夷此云棄謂犯此罪者永棄佛海邊外若比丘共比丘同戒不捨戒戒羸不自悔犯不淨行乃至共畜生是比丘波羅夷不共住須提那尊者因歲饑領眾往故里乞食其母屢勸尊者捨道還俗尊者再三不允母云汝既不還可為種子使汝種不斷于時佛未制戒尊者不知其過遂諾母命乃與妻三成其事後佛知故制共比丘同戒者謂共諸比丘同稟具戒也不捨戒者佛言比丘不樂淨行聽捨戒還家捨時對三寶前如法三唱而捨若狂亂心或對狂亂人前乃至天龍鬼神及不解如是語者前俱不成捨語而不了了者亦不成捨戒羸者戒多毀犯也戒多毀犯便當勇猛懺悔戒體復完今又不能懺悔則惡且日長必至于犯不淨行矣不淨行即淫法也乃至共畜生者後因一比丘林中獨居與一雌獼猴交他比丘伺見白佛故兼制之凡比丘若犯一切男女人非人是道非道有隔無隔初入如毛頭許俱得波羅夷罪方便不入者偷蘭遮若有怨家強捉比丘行不淨行不受樂者不犯受樂者犯若比丘教彼比丘行不淨行彼比丘若作教者偷蘭遮不作教者突吉羅比丘尼犯者波羅夷式叉摩那沙彌沙彌尼俱突吉羅滅𢷤若睡眠無所覺知及不受樂一切無有婬欲意者不犯波羅夷不共住者謂犯者不得與清眾共一說戒共一羯磨也蓋犯此者即當滅擯若有犯不覆藏者當退位在比丘後沙彌前不同一切比丘事不應授他人戒不得畜沙彌不得受他依止不得教誡比丘尼當自屈意調伏心行盡形壽不得離若證阿羅漢果方超入大僧位也若比丘在聚落中若閑靜處不與物盜心取隨不與取法若為王王大臣所捉若殺若縛若驅出國汝是賊汝癡汝無所知是比丘波羅夷不共住檀尼迦尊者為己造屋私取平沙王材木事發被攝國法盜五錢當論死王以比丘故但呵而遣之佛知故制凡物必人與方可取人不與而以盜心取則實盜也隨不與取法者謂依國王不與取之法而論罪也凡盜取一切財物值五錢離本處五尺犯棄五錢此土值銀一錢也若減五錢偷蘭遮若欲取而未取者偷蘭遮若方便破壞他物若倚親厚強力而取若以言辭誑詐而取若以呪術等力而取得五錢俱犯棄若減五錢若未得俱偷蘭遮若為他人偷渡關稅作諸方便皆偷蘭遮若方便求得五錢犯棄不得偷蘭遮方便求得減五錢偷蘭遮不得突吉羅若教他人求五錢得五錢二俱犯棄不得二俱偷蘭遮若教他人求減五錢得減五錢二俱偷蘭遮不得二俱突吉羅若教人求五錢受教者得減五錢二俱偷蘭遮若方便教人求減五錢受教者得五錢受教者犯棄教者偷蘭遮若方便教人求五錢受教者乃取異物五錢取者犯棄教者偷蘭遮若方便教人求五錢受教者謂是使取物無盜心取五錢教者犯棄受教者無犯若教人取物受教人謂教盜取得五錢受教者犯棄教者無犯若有主物有主疑無主物有主疑無主物無主疑取五錢俱偷蘭遮若有主物有主疑無主物有主疑無主物無主疑取減五錢俱突吉羅比丘尼犯者波羅夷式叉摩那沙彌沙彌尼俱突吉羅滅擯若與想取若己物想取若糞掃想取若暫取想取若親厚意取無犯若比丘自手斷人命持刀與人嘆譽死快勸死咄男子用此惡活為寧死不生作如是思惟種種方便嘆譽死快勸死是比丘波羅夷不共住婆裘園諸比丘習不淨觀深厭色身遂欲自殺時有勿力迦難提比丘是外道種持刀入園比丘倩斷其命以衣鉢酬之由是死者相繼居士見之譏嫌佛知故制斷人命者簡非人也刀與人者知他欲自殺便以刀與之或以刀與彼令彼行殺也嘆譽死者讚譽其死之善快勸死者勸其速死也咄男子下正快勸之辭持刀與人下皆非自手殺而心實殺也凡比丘若自殺教他殺使禽獸殺毒藥殺或方便坑陷以至用水火木石等斷其命者皆犯棄方便不死者偷蘭遮若殺天龍鬼畜生能變形者犯偷蘭遮方便不死突吉羅殺畜生波逸提方便不死者突吉羅若人疑非人若人作非人想若非人人想若非人疑人殺之俱偷蘭遮比丘尼犯者波羅夷式叉摩那沙彌沙彌尼俱突吉羅滅擯若擲刀杖瓦石等誤殺者一切無害心而死者俱無犯若比丘實無所知而言我得上人法我已入聖智勝法我知是我見是彼於異時若問若不問欲自清淨故作如是說我實不知不見言知言見虗誑妄語除增上慢是比丘波羅夷不共住因歲饑乞食難得佛命隨處安居時婆裘園比丘𥨱作方便希易得故乃向居士家說我得上人法等上人法猶云過人法聖智勝法謂聲聞四果四智之法也我知是我見是即指聖智勝法而言彼於異時下對人發露之辭縱能發露猶結棄罪除增上慢者因一比丘耻未得道妄言已得後以精進故證阿羅漢果疑前妄語犯棄因白佛佛為開之為是增上慢心故作是說非虗誑以希利養者比也凡比丘向人說得上人法等語前人知者波羅夷前人不知者偷蘭遮若以手印若書信若遣使若作相彼知者波羅夷不知者偷蘭遮若實得道向不同意人說突吉羅比丘尼犯者波羅夷式叉摩那沙彌沙彌尼俱突吉羅滅擯若實得向同意人說若向人說諸法而不言我得不犯諸大德我已說四波羅夷法若比丘犯一一波羅夷法不得與諸比丘共住如前後亦如是比丘得波羅夷法不應共住如前謂如半月前犯者皆波羅夷不共住後亦如是者謂此半月後有犯皆同此結罪也今問諸大德是中清淨不三說諸大德是中清淨默然故是事如是持諸大德是十三僧伽婆尸沙法半月半月說戒經中來僧伽此云眾婆尸沙此云殘犯此罪者已幾于棄如人為他所斫而未斷咽喉僅存殘生理宜速救也若比丘故弄陰出精除夢中僧伽婆尸沙迦留陀夷欲心熾盛乃弄陰失精佛知故制後有一比丘夢中失精疑犯此戒白佛佛為除之凡弄陰未失精者偷蘭遮若比丘教他失精教者偷蘭遮若不失突吉羅若教餘人失不失俱突吉羅比丘尼犯者波逸提式叉摩那沙彌沙彌尼俱突吉羅若不弄而自失者不犯若比丘婬欲意與女人身相觸若捉手若捉髮若觸一一身分者僧伽婆尸沙迦留陀夷於房門外伺諸女人至引入看房遂與身相摩觸佛知故制若捉手下皆身相觸也與一切女人身相觸一觸一僧殘若以衣服等觸其身分偷蘭遮若以衣服觸衣服者突吉羅若與天女阿修羅女鬼神女龍女畜生女能變形者相觸皆偷蘭遮畜生女不能變形者突吉羅若與男子相觸突吉羅若與二形相觸偷蘭遮若人女非人女想非人女人女想非人女疑人女俱偷蘭遮比丘尼犯者波逸提式叉摩那沙彌沙彌尼俱突吉羅若誤相觸無淫欲意不犯若比丘婬欲意與女人麤惡婬欲語隨麤惡婬欲語僧伽婆尸沙迦留陀夷因佛制不得相觸乃引女人入房向彼說粗惡婬欲語佛知故制隨其語之多少了了者一語一僧殘不了了者偷蘭遮若其語在二道之外不甚粗惡者偷蘭遮若天女修羅女鬼神女龍女畜生女能變形者及二形黃門向說麤惡語彼知者偷蘭遮不知者突吉羅若作手印若書信若遣使若現相彼知者偷蘭遮不知者突吉羅向畜生不能變形者說粗惡語突吉羅向男子說粗惡語突吉羅人女疑非人女人女作非人女想非人女作人女想非人女疑是人女俱偷蘭遮比丘尼犯者偷蘭遮式叉摩那沙彌沙彌尼俱突吉羅若向女人說言女身不淨等不犯若比丘婬欲意於女人前自嘆身言大妹我修梵行持戒精進修善法可持婬欲法供養我如是供養第一最如是語者僧伽婆尸沙迦留陀夷因佛制不得向女人說麤惡婬欲語乃向諸女人自嘆譽其身之德索欲供養佛知故制若向女人嘆身索欲語了了者一語一僧殘不了了偷蘭遮若嘆身索供養而不索欲者若除二道外令別作供養者偷蘭遮若作手印若書信若遣使若現相彼知者僧殘不知者偷蘭遮若天女修羅女乃至畜生女能變形者向說而了了者偷蘭遮不了了者突吉羅若手印等彼知者偷蘭遮不知者突吉羅向畜生不能變形者嘆身突吉羅向男子歎身突吉羅若人女疑非人女若人女作非人女想非人女作人女想非人女疑人女俱偷蘭遮比丘尼犯者偷蘭遮式叉摩那沙彌沙彌尼俱突吉羅若比丘往來彼此媒嫁持男意語女持女意語男若為成婦事若為私通乃至須臾頃僧伽婆尸沙羅閱城有比丘迦羅善知俗法嘗為人作媒嫁城中居士便言釋子善為媒嫁比丘白佛佛為制戒若比丘自受語自往彼語還報者僧殘往彼語而不還報者偷蘭遮若聞語往彼說還報者僧殘不還報偷蘭遮若作書遣使指印現相往來皆同罪若與語而不受便往彼說還報偷蘭遮若受語不往彼語不還報突吉羅若不受語往說不還報突吉羅其還報語若言已嫁與他若言至餘處若言死若言賊將去若言無一切偷蘭遮若言癩病若言癰病若言白癩乾消顛狂若言痔道有瘡及膿出不斷一切僧殘若比丘一反媒嫁人女僧殘隨媒嫁多少說而了了者一一僧殘若不了了偷蘭遮媒嫁畜生突吉羅媒嫁男突吉羅若比丘持他書往不看者突吉羅若為白衣作餘使命突吉羅比丘尼罪同式叉摩那沙彌沙彌尼突吉羅不犯者若夫婦離別為還合若為父母疾患若繫在獄看書持往若為信心居士病若繫在獄看書持往若為佛法僧塔若為病比丘看書持往無犯若比丘自乞作屋無主自為己當應量作是中量者長佛十二磔手內廣七磔手應將餘比丘往看處所彼比丘當指示處所無難處無妨處若比丘有難處妨處自乞作屋無主自為己不將餘比丘往看處所若過量作者僧伽婆尸沙佛在耆闍崛山聽諸比丘自作屋有一比丘大作屋繁索信施施主譏避又一比丘為自作屋手砍大樹彼樹神念樹被砍子孫無依欲打比丘又恐得罪來白佛佛嘆言善哉若打持戒比丘獲罪無量今恒河邊有一大樹名娑羅其神始命終汝可速往居止佛因制戒蓋無主則必乞之於人自為己則非為廣眾豈可廣索財物而過量作屋哉磔者張手一跨也佛一磔手准今尺一尺六寸將餘比丘者將餘知法比丘也彼比丘即知法者也難處謂獅子虎狼盜賊惡國界惡國王下至虫蟻多處是也妨處謂有妨礙之處如田園屋宅道路丘墓等及尼庵酒肆王臣外道往來遊戲等處是也若比丘下結罪不將餘比丘指示造屋是一僧殘過量作是一僧殘有難有妨處二突吉羅作而未成者二偷蘭遮二突吉羅若教人作成者二僧殘二突吉羅教人作而未成者二偷蘭遮二突吉羅為他人作成者二偷蘭遮二突吉羅作而未竟者四突吉羅比丘尼犯者偷蘭遮式叉摩那等俱突吉羅若作佛殿講堂及為廣眾作過量者不犯若比丘欲作大房有主為己作應將餘比丘往看處所彼比丘應指示處所無難處無妨處若比丘有難處妨處作大房有主為己作不將餘比丘往看處所者僧伽婆尸沙因闡陀尊者與優填王友善王欲為作大房近拘睒彌城有尼拘律神樹行人車馬往來皆止息其下尊者往伐作屋人皆譏嫌佛知故制作大房出施主意過量作無犯但當請僧指授處所無難與妨可也此中無僧指授是一僧殘有難有妨是二突吉羅作而未成一偷蘭遮二突吉羅若教人作成者一僧殘二突吉羅未成者一偷蘭遮二突吉羅為他作者一偷蘭遮二突吉羅作而未成者三突吉羅比丘尼犯者偷蘭遮式叉摩那沙彌沙彌尼俱突吉羅若王自作者不犯若比丘以嗔恚所覆故非波羅夷比丘以無根波羅夷法謗欲壞彼清淨行彼於異時若問若不問知此事無根說我嗔恚故作是語若比丘作是語者僧伽婆尸沙沓婆摩子尊者為眾知臥具房舍器物及次第差僧受食有慈地比丘來居最下座所得惡房惡臥具次日差受食又得惡食便生嗔恚謂尊者有愛憎心託妹慈比丘尼以無根波羅夷謗佛差僧詰實因制戒無根者無見根無聞根無疑根也三者俱無而妄以波羅夷謗說而了了者僧殘不了了者偷蘭遮若手印書信遣使作相等彼知者僧殘不知者偷蘭遮除四重外以非法謗者結罪亦同若謗比丘尼僧殘謗式叉摩那沙彌沙彌尼俱突吉羅比丘尼犯者僧殘式叉摩那沙彌沙彌尼俱突吉羅若比丘以嗔恚故於異分中取片非波羅夷比丘以無根波羅夷法謗欲壞彼清淨行彼于異時若問若不問知是異分中取片是比丘自言我嗔恚故作是語作是語者僧伽婆尸沙即前慈地比丘事僧以無根治罪後在耆闍崛山下見二羊相交自言羝羊是沓婆摩子母羊是慈比丘尼遂復謗言親見其事非無根也佛審實因制戒異分猶云他分言非彼親分也凡同姓同名同貌而實非者皆名異分取片者於他分中取少分以生謗也結罪同上若比丘欲壞和合僧方便受壞和合僧法堅持不捨彼比丘應諫是比丘言大德莫壞和合僧莫方便壞和合僧莫受壞和合僧法堅持不捨大德應與僧和合歡喜無諍同一師學如水乳合於佛法中有增益安樂住是比丘如是諫時堅持不捨彼比丘應三諫乃至三諫捨者善不捨者僧伽婆尸沙提婆達多欲殺佛而未能乃作壞僧法以誘眾從己佛因制戒初句欲壞和合僧出其本意也方便受壞和合僧法言受方便壞僧之法也方便壞和合僧法提婆凡有五事一盡形乞食二盡形著糞掃衣三盡形露坐四盡形不食酥鹽五盡形不食魚肉此五法似善而心在壞和合僧則矯詐也又凡法說非法非法說法律說非律非律說律乃至別設因緣破散僧眾者皆壞和合僧法也三諫不捨者僧殘以欲壞未壞故若果壞則罪同七逆非止此也然亦須白四羯磨作白竟捨者一偷蘭遮一羯磨捨者二偷蘭遮二羯磨捨者三偷蘭遮三羯磨竟僧殘若初白未竟捨者突吉羅一切未白時方便欲壞和合僧等皆突吉羅若僧為作羯磨時有比丘教莫捨者偷蘭遮未羯磨時教莫捨者突吉羅餘四眾人教者盡突吉羅比丘尼犯者僧殘式叉摩那沙彌沙彌尼俱突吉羅若破非法非律一切惡友不犯若比丘有餘伴黨若一若二若三乃至無數是比丘語彼比丘言大德莫諫此比丘此比丘是法語律語此比丘所說我等喜樂我等忍可彼比丘應諫是比丘言大德莫作是說言此比丘是法語律語此比丘所說我等喜樂我等忍可何以故此比丘非法語非律語大德莫欲壞和合僧汝等當樂欲和合僧大德與僧和合歡喜不諍同一師學如水乳合於佛法中有增益安樂住是比丘如是諫時堅持不捨彼比丘應三諫乃至三諫捨者善不捨者僧伽婆尸沙提婆餘黨有四一名三文陀達多二名騫荼達婆三名拘婆離四名迦留羅提舍此其黨之上首也從亦應多前提婆欲壞和合僧而清眾屢諫此邪黨助其所壞反諫清眾言莫呵提婆達多佛聞故制是比丘下乃邪黨諫清眾之辭此比丘指提婆也彼比丘應諫下乃清眾轉諫邪黨之辭莫欲壞和合僧出其意也汝等下勸其和合也是比丘下結罪白四羯磨捨不捨結罪同上餘結罪亦同上若比丘依聚落若城邑住行惡行汙他家亦見亦聞諸比丘當語是比丘言大德行惡行汙他家亦見亦聞今可遠此聚落去不須住此是比丘語彼比丘言大德今諸比丘有愛有恚有怖有癡有如是同罪比丘有驅者有不驅者諸比丘諫言大德莫作是語言諸比丘有愛有恚有怖有癡有如是同罪比丘有驅者有不驅者而諸比丘不愛不恚不怖不癡大德行惡行汙他家亦見亦聞是比丘如是諫時堅持不捨彼比丘應三諫乃至三諫捨者善不捨者僧伽婆尸沙起自阿濕婆富那婆娑二比丘在䩭連村舍住行惡行汙他家自種花木灌溉摘華作鬘持送與人教人亦爾又與女人同坐同飲食乃至戲咲歌舞行動之際全無威儀俗皆喜樂有清淨比丘具威儀者至彼乞食反不得食回白佛佛乃差目犍連舍利弗領眾往與作擯羯磨二比丘言僧有愛恚二尊者回白佛佛更遙呵制戒行惡行即上種花木等汙他家有四一依家污家謂比丘向人家得物與一家不與一家與者喜不與者嗔二依利養污家謂比丘如法所得利養與一家不與一家與者喜不與者嗔三依親友污家謂比丘與王臣友善護一家不護一家護者喜不護者嗔四依僧寺汙家謂比丘取僧物與一家不與一家與者喜不與者嗔諸比丘當語下諫而驅之也是比丘下乃犯戒者自遮之辭有愛故不驅有恚故強驅有怖故不敢驅有癡故不知當驅不當驅所以犯罪同而驅不驅有異也諸比丘諫言下證入其罪也是比丘下結罪白四羯磨捨與不捨結罪同上餘結罪亦同上若為三寶常住種花木作供養等不犯若比丘惡性不受諫語於戒法中諸比丘如法諫已自身不受諫語言諸大德莫向我說若好若惡我亦不向諸大德說若好若惡諸大德且止莫諫我彼比丘諫是比丘言莫自身不受諫語大德自身當受諫語大德如法諫諸比丘諸比丘亦如法諫大德如是佛弟子眾等增益展轉相諫展轉相教展轉懺悔是比丘如是諫時堅持不捨彼比丘應三諫乃至三諫捨者善不捨者僧伽婆尸沙起自闡陀尊者惡性不受戒若有諫者便言大德莫諫我我應教汝且云我是聖主得正覺故佛知故制言諸大德下正不受諫之辭彼比丘諫下乃諸比丘正諫之辭是比丘下結罪白四羯磨捨不捨結罪同上餘結罪亦同上若彼言非法非律則不受諫者不犯諸大德我已說十三僧伽婆尸沙法九戒初犯餘至三諫若比丘犯一一法知而覆藏應強與波利婆沙行波利婆沙竟增上與六夜摩那埵行摩那埵竟應與出罪當二十僧中出是比丘罪若少一人不滿二十眾是比丘罪不得除諸比丘亦可呵此是時此總結前罪也前九戒初犯即得僧殘後四戒必三諫不捨方得僧殘波利婆沙此云別住謂諸比丘不與同僧事同起止也犯罪者若覆藏當隨其覆藏之日多少強罰行別住法行別住竟與六夜摩那埵摩那埵此云意喜謂別住竟罪將出歡喜行此行也又云極苦卑劣行謂當於晨朝洒掃佛塔僧院洗僧大小便處又不得與欲不得受他人欲不得比丘前後行不得受一切人禮拜不得與人說法論義等應持破舊衣鉢應當禮拜大僧云大德某甲犯某僧伽婆尸沙望大德與某甲出罪行六夜竟應與二十僧中出罪若少一人罪不得出僧亦得呵也若犯而不覆藏者直與六夜摩那埵今問諸大德是中清淨不三說諸大德是中清淨默然故是事如是持諸大德是二不定法半月半月說戒經中來不定者於三法中不定治當審實其罪也若比丘共女人獨在靜處覆處可作婬處坐說非法語有住信優婆夷於三法中一一法說若波羅夷若僧伽婆尸沙若波逸提是坐比丘自言我犯是罪於三法中應一一法治若波羅夷若僧伽婆尸沙若波逸提如住信優婆夷所說應如法治是比丘是名不定法迦留陀夷未出家時與親友婦齋優婆夷通既出家猶與往來一日往其家於屏處同坐說非法語有住信優婆夷窺見白佛故制靜處謂無人處覆處謂弗現露處無人且弗現露是可作婬處也住信者謂住於信實不妄語也若者不定之辭於三法中隨住信者實舉其犯罪之相俟知律者定罪也于中行婬者犯棄說非法語者犯僧殘但同坐而無前二者犯墮是坐比丘下乃犯者領罪之語若比丘一一自言當如自言治若比丘不一一自言當用覓罪相毗尼治若比丘先在屏處坐女人來問訊禮拜者不犯但當速遣出若同坐者亦犯墮若比丘共女人在現露處不可作婬處坐說麤惡語有住信優婆夷於二法中一一法說若僧伽婆尸沙若波逸提是坐比丘自言我犯是罪於二法中一一法治若僧伽婆尸沙若波逸提如住信優婆夷所說應如法治是比丘是名不定法此條犯者舉者皆同前人但在不可作婬之處故無波羅夷止隨二法治也諸大德我已說二不定法今問諸大德是中清淨不三說諸大德是中清淨默然故是事如是持
