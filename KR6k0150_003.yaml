body:
  text: 福州鼓山嗣祖沙門元賢述九十波逸提之餘若比丘別衆食除餘時波逸提餘時者病時施衣時作衣時道行時船行時大衆集時沙門施食時是謂餘時提婆達多教人害佛復教阿闍世王殺父惡名流布利養斷絶乃與其黨三聞陀羅達多騫馱達婆拘波離迦留羅提舍五人家家乞食佛聞故制別衆食者四人已上即犯比丘尼犯者波逸提式叉摩那等俱突吉羅後有病比丘有請食處不得食有一比丘自恣竟作衣時諸居士設食不敢食又有一居士設食兼施衣比丘不敢食有諸居士同諸比丘同道行居士與食不敢食乃入村乞食為賊所劫又船行亦爾有大衆比丘遊行到一小村居士作食比丘不敢食有瓶沙王姊欲為外道沙門王令入祇園設食衆不敢受已上因緣俱白佛佛俱為開除沙門者指外道沙門也若有上餘時因緣應起白衆隨次受食不白而入食者突吉羅若四人五人應分作二次入食無犯若比丘至白衣家與餅飯比丘須者應兩三鉢受持至寺內分與餘比丘食若比丘無病過兩三鉢受持至寺內不分與餘比丘食者波逸提一婦人歸父母家因作食施乞食比丘正作食時夫家遣人來接婦云待作食竟同去乞食者相繼來婦不得去夫嗔即別娶又一商人在途中造食乞食比丘至分己食與之復有乞食比丘至盡分與乃重作食同伴以遲故先去彼商後行被賊劫佛聞故制若無病而過三鉢受出彼門波逸提若一足出門便止突吉羅凡遇食須問是歸婦食商賈道路食不若是者或受一鉢或二三鉢持歸分餘比丘食須告餘比丘某處有歸婦食商賈食我已持一鉢歸汝等去可持二鉢歸或云我已持二鉢歸汝等去可持一鉢歸或云我已持三鉢歸汝等去當就彼食不可持歸若不問歸婦食商賈食者突吉羅若不分與餘比丘者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若病比丘過受者若自送至寺者不犯若比丘足食竟或時受請不作餘食法而食者波逸提佛在祇園說一食法讚譽一食法諸比丘信樂便受一食法或食粥或食飯餅等或飲漿服藥便當一食多不得飽形體枯瘦佛乃令一坐飽食飽食已或遇飯餅等不敢更食形亦枯瘦佛又聽一食後更食諸病比丘不能一坐飽食佛又聽數數食其餘與瞻病人瞻病人亦數數食又有諸比丘乞食歸持來食分與諸比丘諸比丘足食已不敢更食棄之佛知乃教作餘食法餘食法者手持食對比丘言大德我足食已知是看是彼比丘應取少許食已語比丘言我食止汝取食之作如是餘食法者不犯又有一貪餮比丘遇食便食不知足食不足食不知餘食不餘食佛乃制戒不作餘食法咽咽波逸提若為他作若知他足食已作若自手捉食或使淨人持食或對淨人前作或以不好食覆好食上作盡突吉羅或比丘受他餘食法盡持去突吉羅比丘尼及式叉摩那等犯者俱突吉羅若病人不作餘食法病人殘食食不作餘食法無犯若比丘知他比丘足食已若受請不作餘食法殷勤請與食長老取是食以是因緣非餘欲使他犯者波逸提一比丘貪食無厭他比丘諫之懷恨在心異時遇食知前諫者已足食不作餘食法勸令食前諫者食之遂反譏前諫者貪食彼問汝知我足食食耶曰知又問汝知而故作耶曰知衆皆訶之佛聞故制若知彼足食勸請彼彼食者二俱波逸提若與彼不食或轉與他人或彼自作餘食法而食與者突吉羅若不知彼足食作不足食想而與者無犯比丘尼及式叉摩那等犯者俱突吉羅若比丘非時受食食者波逸提難陀跋難陀二比丘入城看節會伎樂衆白衣與之飲食抵暮方回又迦留陀夷向晚乞食一孕婦開門值天正雷電暫見其面驚謂是鬼遂墮胎佛聞故制非時者日中後至明相未出也若非時非時想波逸提若非時疑是時突吉羅非時時想突吉羅時非時想突吉羅時疑非時突吉羅若非時食過非時食七日藥過七日食波逸提盡形壽藥無病因緣服者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若病者服吐下藥須粥日已過中應煮麥令皮不破漉汁服之無犯若比丘食殘宿食者波逸提迦羅尊者乞食時作念云何用日日乞食入城疲苦今當留所食之餘存於明日明日之餘存於後日諸比丘於小食大食時不見迦羅查問知此佛聞故制宿作宿想波逸提宿疑非宿突吉羅非宿宿想突吉羅非宿疑宿突吉羅宿非宿想突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若食有餘與父母與作塔人與作房舍人後乞食比丘從彼邊乞得食無犯若比丘不受食若藥著口中除水及楊枝波逸提一比丘自願常行乞食至城中見諸居士祭亡所遺飲食不從人受自取食之衆見譏嫌佛聞故制凡食須從人受若自取即是盜故制若藥者酥油生酥蜜石蜜等比丘尼犯者波逸提式叉摩那等俱突吉羅若取水及楊枝不從人受不犯若比丘得好美食無病自為己索者波逸提跋難陀向一商人索美食商人問言尊者有何病報言無病但意欲得商人言我等營生勞苦尚不易得此況出家人乎時有乞食比丘聞之嫌責佛知故制索得犯墮不得突吉羅比丘尼及式叉摩那等犯者俱突吉羅若為病乞若為病人乞若不乞而得無犯若比丘外道男女自手與食者波逸提佛與諸比丘遊行途中諸人設供大得餅佛命阿難分與衆僧有餘復命分與乞人中有一裸形外道女有姿色偶二餅相粘不覺分與彼衆知此女獨得二餅遂譏阿難于女有情又一梵志在此得食路逢一相士問何處來報言禿頭居士處來士言你從彼得食何以相譏梵志道其由佛聞故制以手與而食者波逸提與而不受者突吉羅欲與而不與者突吉羅比丘尼及式叉摩那等犯者俱突吉羅若置地與若使人與若勢力強奪者無犯若比丘先受請已若前食後食行詣餘家不囑餘比丘除餘時波逸提餘時者病時作衣時施衣時是謂餘時一長者為跋難陀設齊兼請衆僧僧衆俱赴時已到而不設食問云必待跋難陀來陀自前食後往餘家至垂過中方來衆雖得食而不飽又一大臣遣使送新果與跋難陀分衆難陀自後食已往餘家歸時日已過中衆不得食佛知因制受請已前食後食不許詣餘家後衆大有請處俱不敢往佛乃聽囑餘比丘而後往後有病比丘先囑城中人為作羮飯等不敢往佛聽不囑而往比丘作衣所須器物欲入城取而不敢往施衣時比丘無衣欲入城乞亦不敢往佛俱聽不囑而往前食者自明相初出至食時後食者自食時至日中囑餘比丘者囑以所往之處令衆知不須待而食也若囑後中道還又欲去者當更囑若囑往某處後更詣他處應更囑而往若不囑而往除餘時波逸提欲去未出門而反者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘在食家中有寶強安坐者波逸提迦留陀夷與舊識白衣婦齊優婆夷各相繫念一日往其家坐夫問汝須何等答言我須食夫即遣婦與食食之復不去夫連遣亦不去夫怒言我出去任汝在後欲何所作乞食比丘聞之嫌責歸白佛故制食者男以女為食女以男為食男女交合各得受用為食也寶指女色亦兼指𤥭𤦲碼瑙金銀等強坐不去者波逸提若盲而不聾聾而不盲者突吉羅立而不坐者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若有寶但於舒手及戶處得坐若有伴同在一處得坐或為勢力所持或病發倒地俱不犯若比丘食家中有寶在屏處坐者波逸提迦留陀夷因佛制許在舒手及戶處坐遂與齊優婆夷在戶扇後坐共語乞食比丘見之譏嫌白佛故制在屏處坐波逸提若盲而不聾等同上比丘尼犯者波逸提式叉摩那等俱突吉羅若舒手得及戶不在屏處坐若有伴同在一處坐或為勢力所持或病發倒地不犯若比丘獨與女人露地坐者波逸提此亦迦留陀夷因前佛制屏處坐遂獨與齊優婆夷在露地坐共語乞食比丘見之譏嫌白佛故制獨與女人露地坐波逸提若盲而不聾等同上比丘尼犯者波逸提式叉摩那等俱突吉羅若有伴不犯或勢力所持或病發倒地不犯若比丘語餘比丘言大德共至聚落當與汝食彼比丘竟不教與是比丘食語言我與汝一處若坐若語不樂我獨坐獨語樂以是因緣非餘方便遣者波逸提跋難陀初與一比丘鬪結恨在心異時誘彼比丘言汝隨我至城中當與汝食比丘信之遂同到城中至無食處遍行一周約日將過語彼比丘言你是大惡人今由汝故并我亦不得食汝可速去我共汝若坐若語不樂我獨坐獨語樂彼比丘去遂自到有食家食彼比丘還祇園日已過中不得食佛聞故制遣去至捨見聞處波逸提若遣聞處至見處遣見處至聞處突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若與食遣去不犯若病遣去持食至寺中與食不犯若破戒破見破威儀為衆所舉若被擯若應擯前未許食者方便遣去不犯若前已許食者突吉羅若比丘四月請與藥無病比丘應受若過受除常請更請分請盡形請波逸提摩訶男釋種請施衆僧藥彼恭敬上座以好者施與餘求者亦與不求者亦與六群往其家索藥男言有者相與不有者買與六群遂譏其有愛心且妄語男退心遂斷施藥佛聞故制四月者夏四月也過四月而受是為過受後有病比丘不敢過受藥故加無病之言後有居士不限月數常請供藥者摩訶男斷後更請施者有持藥至寺中分者有請施盡形壽藥者俱以過四月不敢受俱白佛佛一一開除比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘往觀軍陳除餘時因緣波逸提波斯匿王因民叛逆自出軍征伐六群比丘往觀王見不悅遂以石蜜一褁寄奉世尊囑令持我名禮拜問訊世尊世尊知乃制戒見者波逸提方便欲往而未往者突吉羅往而未見者突吉羅若道中遇行軍應避不避者突吉羅後有二將欲見比丘遣人來請佛聽往故云除時因緣比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘有因緣聽至軍中二宿三宿過者波逸提六群比丘有因緣至軍中宿居士見之譏嫌佛因制不許過三宿三宿明相出犯波逸提若離見處至聞處離聞處至見處突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若為事難所拘者不犯若比丘軍中住二宿三宿或時觀軍陳鬪戰或觀遊軍象馬力勢者波逸提六群比丘有因緣往軍中三宿在中觀鬪戰一人被箭傷衣褁輿歸諸居士見之譏嫌佛聞故制往見者波逸提往而未見者突吉羅方便欲往而未往者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅或為勢力所持者無犯若比丘飲酒者波逸提娑伽陀尊者常往梵志家借宿降其室中毒龍時拘睒彌王見之大生敬重異日為尊者設食尊者受食多飲黑酒歸途倒地而吐佛聞知呵言如今不能降小龍況大龍耶乃為制戒凡飲酒而能醉人者俱波逸提若飲不能醉人者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若以酒治病者不犯若比丘水中嬉戲者波逸提十七群比丘在阿耆跋提河浴於中嬉戲順流逆流或出或沒或互相澆灒等時波斯匿王與茉利夫人在樓上見之王言看汝所事者夫人言此是年少出家佛法未久故爾乃疾遣人到祇園問訊世尊奉上石蜜一褁具白前事佛聞故制凡在水中放意自恣一切嬉戲者俱波逸提若以酪漿若以苦酒若麥汁等弄戲者俱突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若有因緣入水而非嬉戲者不犯若比丘以指相擊攊者波逸提六群比丘中一人擊攊十七群比丘一人至死佛聞故制或以手指或以腳指相擊攊者俱波逸提若以杖拂柄等相擊攊者俱突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若眠觸令覺者若誤觸者不犯若比丘不受諫者波逸提闡陀比丘欲有所犯比丘諫之不從佛聞故制若自知我所作非不從諫者波逸提若自不知我所作非不從諫者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若無智人來諫所諫非是者應報言汝可問汝和尚學知諫法然後可來相諫若戲笑語者不犯若比丘恐怖他比丘者波逸提迦那波羅尊者侍佛左右佛一夜出房經行初夜已過請佛歸房佛默然至後夜將過請佛歸房佛亦默然那波自念言我當恐怖佛令歸房乃反披惡衣作非人恐怖聲言沙門我是鬼佛報言當知此愚人心亦是惡乃為制戒凡以色聲香味觸法六種恐怖人前人若知若見若聞俱波逸提前人若不知不見不聞俱突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若有其事不舉似者若無恐怖他意者俱不犯若比丘半月洗浴無病比丘應受若過受除餘時波逸提餘時者熱時病時作時風雨時遠行時是謂餘時瓶沙王有池水恆聽比丘浴六群比丘於後夜入池浴爾時王同諸綵女俱詣池聞內有聲問是誰左右言是比丘王令莫驚使去六群久浴至明相出王未得浴而去佛聞制戒比丘半月受浴若過一遍波逸提若水澆半身亦波逸提若方便欲去而未去者突吉羅熱時者春四十五日夏初一月是當此土三月初一日至五月十五日也有病可知作者作種種務勞力者是道行者下至半由旬是此等比丘畏不敢浴白佛佛為開除比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘無病為炙身故露地然火若自然若教人然除餘時因緣波逸提六群比丘欲然火炙身自相謂言我等在上座前不得隨意言語即出外在露地中拾野薪然火炙身傍朽樹中有毒蛇因火煙熏逼而出衆見俱走將火株擲散延燒講堂佛知故制凡露地然草木牛糞一切火炙身者俱波逸提若被燒半燋者若擲著火中者俱突吉羅若然炭突吉羅若不語前人知是看是者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅除時因緣者若病自然火炙身及教人然不犯或有因緣必須然火者不犯若比丘藏他比丘衣鉢坐具針筒若自藏若教人藏下至戲笑者波逸提十七群比丘將衣鉢坐具針筒安著一面經行俟食時到六群比丘調弄背取衣鉢等藏之及時到十七羣比丘取衣鉢等不得餘比丘察之白佛故制藏者波逸提方便欲藏而未藏者突吉羅教人者罪同比丘尼犯者波逸提式叉摩那等俱突吉羅若實知是彼人物為護惜而取舉者若比丘性慢藏故取藏為戒敕彼者若借彼衣著而彼不收恐失便取舉者或以此衣鉢等物故有難取藏之者俱無犯若比丘淨施比丘比丘尼式叉摩那沙彌沙彌尼衣後不問主輒著者波逸提六群比丘施親厚比丘衣後不語主還取著佛聞故制淨施有二一真實淨施二展轉淨施真實淨施者言此是我長衣未作淨今為淨故與長老作真實淨展轉淨施者言此是我長衣未作淨今為淨故與長老彼應作如是語長老聽長老有如是長衣未淨今與我為淨故我便受受已當問言欲與誰耶應報言與某甲彼應作如是語長老有是長衣未作淨今與我為淨故我便受受已與某甲比丘此衣是某甲比丘所有汝為某甲故守護持隨意用此展轉淨施者語不語隨意取著無犯若真實淨施不語主而取著波逸提比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘得新衣當作三種染壞色若青若黑若木蘭若得新衣不作三種染壞色持者波逸提六群比丘著白衣居士見之譏嫌謂如王王大臣等佛聞故制新衣不獨初造衣凡初從人得者俱名新衣隨所得衣不問何色皆以三種染壞青者銅青黑者雜泥木蘭者樹皮也不染壞而著者波逸提不染壞而畜者突吉羅衣未染寄白衣家亦突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若衣鉢囊革屣囊線囊手巾等小衣不染畜者無犯若比丘故斷畜生命者波逸提迦留陀夷不喜見烏作竹弓射之死者甚衆居士見之譏嫌佛聞故制凡自殺教人殺或以刀箭或以瓦石或以坑陷或以毒藥俱波逸提若方便欲殺而未殺者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若無殺心誤傷者不犯若比丘知水有蟲飲用者波逸提六群比丘取雜蟲水飲用見者譏嫌佛因制戒有蟲水有蟲想波逸提有蟲水疑無蟲突吉羅若苦酒清酪漿麥汁等知有蟲飲用者波逸提比丘尼犯者波逸提式叉摩那等俱突吉羅若不知有蟲者若漉過用者不犯有大蟲當以手觸令去若比丘故惱他比丘乃至少時不樂者波逸提十七群往六群處問言長老云何入初禪乃至阿羅漢耶六群報言汝等自稱得上人法犯波羅夷十七群大作疑惱往問上座上座云不犯佛聞故制若故惱他說而了了者波逸提說而不了了者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若不故作者若其事實爾者不犯若比丘知他比丘犯粗罪覆藏者波逸提跋難陀與一比丘親厚數犯粗罪令彼莫語人後與彼比丘鬪比丘向餘人說難陀犯如是如是罪令我莫語人佛聞故制粗罪者波羅夷僧伽婆尸沙也若比丘知他比丘犯粗罪小食知食後說中夜知後夜說俱突吉羅若欲說不說至明相出波逸提若覆餘罪突吉羅自覆藏粗罪加突吉羅除比丘比丘尼覆藏式叉摩那等粗罪突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若先不知粗罪作不粗罪想若欲向人說而無人可說若說或有命難梵行難不敢說無犯若比丘年滿二十當與受大戒若比丘知年未滿二十與受大戒此人不得戒諸比丘可呵癡故波逸提羅閲城中有十七群童子先為親友最大者年十七最小者年十二互相勉勵共求出家諸比丘度令出家受大戒諸童幼小不堪一食夜半患饑啼哭索食佛聞謂不應受年未滿二十者大戒以年未滿二十者不堪忍寒熱饑渴暴風蚊虻毒蟲惡言及身種種痛苦又復不堪持戒當知年滿二十始堪忍此乃為制戒和尚知年未滿二十與受戒三羯磨竟和尚波逸提二羯磨竟和尚三突吉羅一羯磨竟和尚二突吉羅白竟和尚一突吉羅白未竟和尚突吉羅若未白為作方便若欲集衆等俱突吉羅和尚不知無犯衆僧知者突吉羅不知無犯比丘尼犯者波逸提若先不知但信受戒人語若傍人證若信父母說無犯若受戒已疑者佛言當聽數胎中年月及閏月若滿者無犯若比丘知諍事如法滅已後更發起者波逸提六群比丘與諸比丘鬪諍如法滅已更發起如是言汝不善觀不成觀不善解不成解不善滅不成滅佛聞故制諍事既滅復舉起說而了了者波逸提不了了者突吉羅除此諍已更作餘諍罵詈者一切突吉羅除比丘比丘尼外共餘人犯諍後更發起者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若先不知已觀作不觀想者若事實爾者無犯若比丘知是賊伴期同道行乃至村間波逸提有諸比丘往毗舍離城時有賈客欲漏關稅要僧共伴行及度關為守關人所獲將至波斯匿王處王問賈客不輸稅此沙門有何事報言與賈客為伴王言法應死俱以沙門釋子乃呵而遣之佛知故制若期至城至村行一一道波逸提行一道或半道突吉羅若行空曠無村處至十里波逸提減十里突吉羅若去而卒不去者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若先不知是賊者不期同行者或勢力所持者不犯若比丘作如是語我知佛所說法行淫欲非障道法彼比丘應諫此比丘言大德莫作是語莫謗世尊謗世尊者不善世尊不作是語世尊無數方便說行淫欲是障道法彼比丘諫是比丘時堅持不捨彼比丘應三諫乃至三諫捨者善不捨者波逸提阿黎吒比丘自生惡見言我知世尊說法行淫欲非障道法時諸比丘諫之不肯捨白佛佛為作白四羯磨呵諫令捨作如是白大德僧聽此阿黎吒比丘作如是語我知佛所說行淫欲非障道法若僧時到僧忍聽僧今與阿黎吒比丘作呵諫捨此事故阿黎吒汝莫作是語莫謗世尊謗世尊者不善世尊不作是語世尊無數方便說淫欲是障道法若犯淫欲即是障道白如是大德僧聽此阿黎吒比丘作如是語我知佛所說法行淫欲非障道法僧今與作呵諫捨此事故阿黎吒莫作是語莫謗世尊謗世尊者不善世尊不作是語世尊無數方便說淫欲是障道法若犯淫欲即是障道誰諸長老忍僧與阿黎吒比丘作呵諫捨此事故者默然誰不忍者說此是初羯磨第二第三亦如是說僧已忍為阿黎吒作呵諫竟僧忍默然故是事如是持作如是羯磨已佛更制戒凡有犯三諫不捨者亦應如是作白四羯磨初白已當語言我已白竟餘有羯磨在汝可捨是莫為衆所呵責更犯罪若捨者善不捨者作初羯磨作初羯磨已當語言我已作初羯磨竟餘有二羯磨在汝當捨是莫為衆所呵責更犯罪捨者善不捨者當為作第二羯磨第二羯磨竟當語言我已作第二羯磨竟餘有一羯磨在汝可捨是莫為衆所呵責更犯罪捨者善不捨者作三羯磨竟波逸提作白已捨者一突吉羅初羯磨捨者二突吉羅二羯磨捨者三突吉羅若作白未竟及未作白捨者俱一突吉羅若他比丘諫是比丘時餘比丘比丘尼遮言莫諫者一切突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若初諫時捨者不犯若比丘知如是語人未作法如是惡見不捨若供給所需共同羯磨止宿語言者波逸提阿黎吒不捨惡見諸比丘又與作不捨惡見羯磨六群比丘乃供給所需共同羯磨止宿語言佛知故制如是語者作前惡見之語也未作法者僧為舉而未解未與懺悔出罪也此等人既知之不當親近若供給所需等亦是惡見之類也犯波逸提供給所需有二種若法若財同止宿者不問先入屋後入屋但知者俱犯比丘尼犯者波逸提式叉摩那等俱突吉羅若不知者不犯若勢力所持者不犯若比丘知沙彌作如是語我知佛所說法行淫欲非障道法彼比丘應諫此沙彌言汝莫作是語莫謗世尊謗世尊者不善世尊不作是語世尊無數方便說行淫欲是障道法彼如是諫此沙彌時堅持不捨彼比丘應三諫乃至三諫捨者善不捨者彼比丘應語此沙彌言汝自今已後非佛弟子不得言佛是我世尊不得隨餘比丘如餘沙彌得與比丘二三宿汝今無此事汝出去滅去不須住此若比丘知是被擯沙彌而誘畜養共一止宿者波逸提跋難陀有二沙彌一名羯那一名摩睺迦共行不淨自相謂言我知佛所說法行淫欲非障道法諸比丘聞之呵責不捨白佛佛為作呵諫羯磨如上沙彌故不捨佛為作滅擯羯磨將二沙彌立在見處不聞處作如是白大德僧聽此二沙彌衆僧呵責故不捨惡見若僧時到僧忍聽僧今為二沙彌作不捨惡見滅擯羯磨自今已去此二沙彌不應言佛是我世尊不得隨逐餘比丘如諸沙彌得與比丘二宿三宿汝等不得汝出去滅去不應住此白如是大德僧聽此二沙彌衆僧呵責故不捨惡見衆僧今與作惡見不捨滅擯羯磨自今已去此二沙彌不得言佛是我世尊不應隨逐餘比丘如諸沙彌得與比丘二宿三宿汝今不得汝出去滅去不應住此誰諸長老忍僧為二沙彌作惡見不捨滅擯者默然誰不忍者說凡三說僧已忍與二沙彌作惡見不捨滅擯竟僧忍默然故是事如是持時六群比丘知僧已滅擯此二沙彌便誘將畜養共止宿諸比丘白佛佛更為制戒若自畜若與人若自誘若教人等俱波逸提比丘尼犯者波逸提式叉摩那等俱突吉羅若先不知者不犯若勢力所持者不犯若比丘餘比丘如法諫時作如是語我今不學此戒當難問餘智慧持律比丘者波逸提若為知為學故應難問闡陀比丘所作非法諸比丘如法諫時乃言我今不學此戒當難問餘智慧持律比丘佛聞故制說而了了者波逸提說而不了了者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘癡不解故彼比丘應教問和尚阿闍黎可更學問誦經若諫者實不如法不犯若比丘說戒時作如是語大德何用說是雜碎戒為說是戒時令人惱愧懷疑輕呵戒故波逸提諸比丘集在一處誦毗尼六群自相謂言彼諸比丘誦律通利必當數數舉我等罪當往止他勿誦乃往語言長老何用誦此雜碎戒為若欲誦者當誦四事十三事餘不應誦何以故若誦令人懷疑憂惱佛聞故制說而了了者波逸提不了了者突吉羅若毀呰阿毗曇及餘經突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘說戒時作如是語大德我今始知此法是戒經所載半月半月說戒經中來餘比丘知是比丘若二若三說戒中坐何況多彼比丘無知無解若犯罪應如法治更增無知罪語言大德汝無利不善得汝說戒時不一心思念攝耳聽法彼無知故波逸提六群比丘中有一人當說戒時自知犯罪恐清淨比丘舉發便先往告言我今始知此法戒經所載半月半月說戒經中來諸比丘察知其意白佛佛故制彼言今始知者意言前此未知故有犯欲避罰也清衆知其二次三次在說戒中坐況又多耶何言今始知是無知也故於所犯罪如法治外更加無知罪汝無利不善得者言其無利益不善得利益也善得利益者於說戒時當一心思念攝耳聽法今既不能故雖聽戒而無所知以無知故如波逸提若不與者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若未聞說戒今始聞者無犯若比丘共同羯磨已後如是言諸比丘隨親厚以僧物與者波逸提沓摩羅子以知僧事塔事外有人設會布施不得赴衣服破壞異時有人施衆僧貴價衣衆僧共議此沓摩羅子以知僧事塔事故外有人設會布施不得赴衣服破壞宜以此衣與之時衆僧白二羯磨與竟六群亦同羯磨後更作是言諸比丘隨親厚以衆僧衣與彼佛聞故制說而了了者波逸提說而不了了者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若其事實爾當日未在羯磨衆中說者無犯若比丘僧斷事未竟不與欲而起去者波逸提一日衆僧集共議僧事六群自相謂言欲為我等作羯磨即起去佛知故制僧斷事未竟而去出戶外者波逸提一足出戶欲去而未去者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若有事與欲去者無犯若非法羯磨不與欲去無犯若比丘與欲已後更呵者波逸提六群中有犯事者恐衆中舉便六人相隨不離互相黨護使衆羯磨不得異時六群作衣衆喚羯磨彼云作衣不得往喚者言可令一二人持欲去六群即令一人受欲來衆僧即與此比丘作羯磨六群悔言彼作羯磨非為羯磨羯磨不成我以彼事與欲非為此事佛知故制說而了了者波逸提不了了者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若其事實不成羯磨者無犯若比丘知他比丘鬪諍聽此語向彼說者波逸提六群聽諸比丘鬪諍語向彼人說令僧未有諍而起諍已有諍而不滅佛知故制若比丘往聽他語聞者波逸提不聞突吉羅若方便欲去而未去者突吉羅若二人共在隱處語暗地語當彈指或謦咳警之不爾突吉羅若在道二人在前共語亦當警之不爾突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘嗔故不喜打比丘者波逸提六群中一人嗔打十七群比丘被打者高聲喚言止止莫打我佛聞故制若手若石若杖打者波逸提若以輕物打突吉羅若戲笑打及打式叉摩那等俱突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘嗔故不喜以手搏比丘者波逸提六群中一人嗔恚故以手搏十七群比丘佛聞故制搏者或遮撥或挃觸也若以手者波逸提用拂柄輕物突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘嗔故不喜以無根僧伽婆尸沙謗者波逸提六群嗔十七群以無根僧伽婆尸沙謗聞者嫌責佛知故制無根者十三事中無見聞疑罪也說而了了者波逸提不了了者突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘剎利水澆頭王種王未出未藏寶若入宮過門閾者波逸提迦留陀夷往入彼斯匿王宮王與茉利夫人盡日共眠夫人見迦留陀夷至即起披衣敷坐令坐時夫人失衣墮地蹲地不能起迦留陀夷即出歸來語諸比丘言波斯匿王第一之寶我今悉見佛聞故制剎利是云剎帝利此云王種水澆頭者以金瓶取四大海水取白牛右角取拾一切種子盛滿中置金輦上使諸小王輿王與第一夫人共坐輦上大婆羅門以水灌王頂上作如是已立為王並名剎利水澆頭王種王未出者王未出𮄊處也未藏寶者采女未還本處亦兼指金銀等寶未藏也若入宮過門閾一切波逸提若一足入內一足在外者突吉羅若入大臣長者等內室者突吉羅比丘尼及式叉摩那等犯者俱突吉羅若王召入若有奏白亦須藏寶而後入無犯若比丘若寶及寶莊飾具若自捉若教人捉除僧伽藍中及寄宿處波逸提若在僧伽藍中及寄宿處若寶及寶莊飾具若自捉若教人捉當作是意若有主識者當取如是因緣非餘有外道從拘薩羅國來途中止息遺却金囊衆多比丘後行拾得共云待來尋者付還彼外道去久方回比丘即付還彼反詐言金少遂聞於王王審實外道理虧將金入官佛聞故制不許捉寶及寶莊飾後因節會日毗舍佉母往會道過祇園因入禮佛自思禮佛不必嚴飾乃卸置樹下始入去時忘取比丘見之不敢舉白佛佛為開僧伽藍中又一比丘寄宿巧匠家巧匠出外室中有金比丘為守護竟夜不得眠白佛佛復并開寄宿處凡比丘見僧伽藍內有遺失者當收取識其所遺器物片段分兩分明及其所包裹囊相若有來索者當問明若相應即付還若不相應可語言我不見是物若比丘拾所遺物不看定不審問者突吉羅若是供養塔寺等物為堅牢故捉收者不犯若在他家止宿有寶恐失應為收舉若在寺外見失物可以草葉覆之俟有主來索若無索者收歸寺內私掌七八日更無索者應貯僧庫經五六月又無索者應供衆僧及買堅牢器若後主來索應勸令捨不捨者應酬本物不與利或有貴不能酬者切不得輕用比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘非時入聚落不囑餘比丘者波逸提跋難陀非時入村與居士摴蒱比丘勝故居士慳嫉便言比丘非時入村為何事耶佛聞故制後有諸比丘為僧事或塔寺事及瞻病人非時不敢入村白佛佛命囑餘比丘而後入時者從明相出至日中非時者從中後至明相未出囑餘比丘者囑同房或比房同住客亦得若不囑而入者初入村門波逸提欲去未去欲入未入俱突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘作繩床木床足應高如來八指除入梐孔上截竟若過者波逸提迦留陀夷作高床座見佛來白言世尊看我床座佛乃制戒高如來八指者佛橫一指二寸應高一尺六寸也梐即栒頭若過八指者自作教人俱波逸提不成者突吉羅為他作成不成俱突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若減作者不犯若比丘持兜羅綿貯作繩床木床臥具坐褥者波逸提六群以兜羅綿作臥具坐褥諸居士見之譏其如國王大臣佛聞故制兜羅綿此翻氷綿從色得名也西域有妬羅樹綿從樹生香而潔白故號兜羅乃貴價物若用之為臥具坐褥侈甚矣自作教他成者俱波逸提不成者突吉羅若為他作成不成俱突吉羅比丘尼犯者波逸提式叉摩那等俱突吉羅若比丘用骨牙角作針筒劑刮成者波逸提有信樂工師為諸比丘作骨牙角針筒家業竭盡衣食缺乏居士謂供養沙門無福得禍佛知故制若自成若教他成俱波逸提未成者突吉羅若為他作成不成俱突吉羅比丘尼及式叉摩那等犯者俱突吉羅若比丘作尼師壇當應量作是中量者長佛二磔手廣一磔手半更增廣長各半磔手若過成者波逸提一日世尊不赴請遍巡諸房見僧臥具露地敷多為不淨所汙佛乃聽作尼師壇若臥時敷在臥見上以為障臥具之用亦為障身隨衣之用六群遂作廣長尼師壇佛知故制初只許長佛二磔手廣一磔手半後因迦留陀夷身量大見佛來故以手挽尼師壇佛問何故報言欲令廣長故挽耳佛因更增廣長各半磔手若自作若教他過量者波逸提未成者突吉羅為他作者成不成俱突吉羅比丘尼及式叉摩那等犯者俱突吉羅減量作者不犯若得他已成者亦當裁應量若貼作兩重不犯若比丘作覆瘡衣當應量作是中量者長佛四磔手廣二磔手若過成者波逸提時諸比丘患種種瘡膿血流出汙身汙衣汙臥具佛乃聽作覆瘡衣時諸比丘覆瘡衣粗著瘡上舉衣患痛佛乃許作細耎衣時六群便作廣長覆瘡衣佛知故制若長應量廣不應量若廣應量長不應量若長廣俱不應量自作教人成者波逸提未成者突吉羅若為他作成不成俱突吉羅比丘尼及式叉摩那等犯者俱突吉羅若減量作者不犯若比丘作雨浴衣當應量作是中量者長佛六磔手廣二磔手半若過成者波逸提毗舍佉母作雨浴衣施僧六群輒自多作廣大雨浴衣佛聞故制長廣若應量不應量成不成等俱同上比丘尼式叉摩那等犯者俱突吉羅若減量作者無犯若比丘與如來等量作衣或過量作者波逸提是中量者長佛十磔手廣六磔手是名如來衣量阿難陀短佛四指一日衆遙見來皆謂是佛即起承迎至乃是難陀衆與難陀俱慚愧佛令著黑衣以別之六群不與如來等量作衣乃過量作佛聞故制此中長廣應量不應量成不成並同上比丘尼式叉摩那等犯者俱突吉羅按佛身量一丈六尺則一磔手當是一尺六寸以此推之衣長一丈六尺廣九尺六寸乃是佛衣量今人短小難可遵用又四分律云大衣離足踝四寸七衣離足踝八寸五衣離足踝一尺二寸薩婆多云衣長五肘廣三肘南山云大衣七衣俱長五肘廣三肘五衣長四肘廣二肘合此三說詳之則但用今人手長十磔手廣六磔手作大衣中衣減四寸五衣減八寸俱不犯也諸大德我已說九十波逸提法今問諸大德是中清淨不三說諸大德是中清淨默然故是事如是持諸大德是四波羅提提舍尼法半月半月說戒經中來波羅提提舍尼此云向彼悔謂犯此者應向彼懺悔罪便得滅也若比丘入村中無病從非親里尼邊自手受食食是比丘應向餘比丘悔過言大德我犯可呵法所不應為今向大德悔過是名悔過法時世儉穀貴人民乏食死者無限比丘乞食難得蓮花色比丘尼入城乞食初日所得食持與比丘二日三日亦如是後更乞食道遇長者車來尼避道墮深泥中面掩地而臥長者見之急令扶起問故乃言乞三日食俱持與比丘今饑乏故倒地耳長者譏嫌佛聞故制不許從尼受食後諸比丘不敢受親里尼食白佛加非親里之言又病比丘不敢受非親里尼食白佛加無病之言自手受食者不問親里非親里有病無病俱不可也比丘尼及式叉摩那等犯者俱突吉羅若有病受非親里尼食若無病受親里尼食若尼持食置地與或使人與或在僧寺尼寺中與俱不犯若比丘在白衣家食是中有比丘尼指示與某甲羮與某甲飯諸比丘應語彼比丘尼言大姊且止須諸比丘食竟若無一比丘語比丘尼如是言者比丘應向餘比丘悔過言大德我犯可呵法所不應為我今向大德悔過是名悔過法衆僧與六群同在白衣家受供六群尼為六群比丘索羮飯遂至越次而與中有不得羮飯者佛聞故制不止比丘尼者波羅提提舍尼比丘尼及式叉摩那等犯者俱突吉羅若尼自為檀越若居士設食令尼處分者不犯有諸學家僧作學家羯磨若比丘知是學家先不受請無病自手受食食是比丘應向餘比丘悔過言大德我犯可呵法所不應為我今向大德悔過是名悔過法有居士家夫婦信樂為佛弟子諸比丘至其家常與飯食無所愛惜後貧窮衣食不足諸人譏言供養沙門反得貧窮之報佛聞為作學家白二羯磨白言大德僧聽此羅閲城中某居士夫婦得信為佛弟子財物竭盡若僧時到僧忍聽僧今作學家羯磨諸比丘不得在其家受食食白如是大德僧聽此羅閲城中某居士家夫婦得信為佛弟子財物竭盡僧今與作學家羯磨諸比丘不得在其家受食食誰諸長老忍僧與某居士作學家羯磨者默然誰不忍者說僧已忍與某居士作學家羯磨竟僧忍默然故是事如是持佛更制戒受學家食者提舍尼後有先受請者不敢赴食又有病者不敢受食佛皆聽許此中不受請一不當食無病二不當食況又自手受食雖受請及病亦不可食也學家者俗中學道之家比丘尼及式叉摩那等犯者俱突吉羅若學家還富來請解羯磨比丘復受食不犯若比丘在阿蘭若逈遠有疑恐怖處住先不語檀越僧伽藍外不受食在僧伽藍內無病自手受食食是比丘應向餘比丘悔過言大德我犯可呵法所不應為我今向大德悔過是名悔過法羅閲城中有女人持食到僧伽藍以逈遠故為賊所觸撓佛乃囑諸比丘語諸檀越莫至僧伽藍道路中有賊故更為制戒不許在僧伽藍內受外來食後有諸人雖知有賊而故持來者比丘以佛制不許受外來食不敢食有病者又以未語檀越不敢食佛俱聽受此中不先語檀越一不當食無病二不當食自手受食三不當食犯提舍尼比丘尼及式叉摩那等犯者俱突吉羅諸大德我已說四波羅提提舍尼法今問諸大德是中清淨不三說諸大德是中清淨默然故是事如是持
