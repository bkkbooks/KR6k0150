body:
  text: 福州鼓山嗣祖沙門元賢述諸大德是三十尼薩耆波逸提法半月半月説戒經中來梵語尼薩耆此云捨波逸提此云墮此三十事皆在衣物上犯罪當墮覆障燒煮地獄今制令罰其衣物向僧中捨則免墮也界內僧或多人或一人俱可捨但不得別衆捨別衆者謂四人已上私出界外別為一衆也若向別衆捨犯突吉羅既捨衣已當于衆中乞懺悔乞已當請一人為懺悔主其人須是清淨比丘方可亦不得遽受懺必先白衆白已然後受懺受懺已衆中當還此比丘衣還衣之法有二種一是即座展轉付還一是直付還其所犯之事或是畜長衣經十日畜非時衣過一月畜急施衣過十日畜長鉢過十日畜藥過七日此五事當即座展轉付又或其人有事欲遠行不能延至明日者僧中可問言此衣捨與誰答言捨與某甲比丘僧即以此衣與之然後為作白二羯磨還此比丘衣若非前五事者應用直付法僧中作白二羯磨直以此衣還之若是前五事其人無遠行因緣可延至明日者亦作直付還惟野蠶綿作臥具不可還應斬碎塗壁及埵餘皆當還若捨衣不還者突吉羅若有言莫還者突吉羅若轉與人者若作別衣用者或為損壞者盡突吉羅若比丘衣已竟迦絺那衣已出畜長衣經十日不淨施得畜若過十日尼薩耆波逸提佛制比丘持三衣不得長長衣者長如來八指廣四指即為長也時佛座下有六群比丘一名難陀二名跋難陀三名迦留陀夷四名闡陀五名馬宿六名滿宿此六群皆畜長衣早晚更換以為莊嚴佛知故制衣已竟者三衣已足也迦絺那衣此云慶賞衣一名功德衣以九旬安居功德勝故檀越持新衣慶賀之此衣五條十隔七月十六日解制後受受此衣者許離衣宿畜長衣受別請等至臘月十五日隨分捨與沙彌等故云已出捨過此衣復受三衣不許離衣宿不許畜長衣當作淨施若不淨施轉貿與人者捨墮加突吉羅經十日得畜者因阿難得貴價衣欲奉迦葉適迦葉未還阿難欲畜恐犯此過乃往白佛佛問迦葉幾時回答云十日佛即聽許十日得畜若一日得衣二日乃至十日亦得衣畜至十一日明相出時俱犯捨墮比丘尼犯者罪同式叉摩那等俱突吉羅若比丘衣已竟迦絺那衣已出於三衣中若離一一衣異處宿除僧羯磨尼薩耆波逸提六群比丘出遊人間以三衣寄親友比丘彼比丘為搬晒他比丘見之白佛故制離一一衣異處宿者於三衣中隨離一衣即犯捨墮除僧羯磨者因一病比丘有事欲往人間糞掃衣重不能持乃白佛佛為作白二羯磨結不失衣法故不犯也若三衣外離餘衣突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若明相未出手捉衣或為事難所拘或衣在擲石所及處無犯若比丘衣已竟迦絺那衣已出得非時衣欲須便受受已疾疾成衣若足者善不足者畜經一月為滿足故若過畜者尼薩耆波逸提佛制畜長衣不過十日有一比丘大衣壞十日不能辦故衣不能即捨乃白佛聽畜一月為滿足造衣故非時衣者謂非施衣之時也施衣時者自恣後無迦絺那衣一月有迦絺那衣五月也比丘尼犯者罪同式叉摩那等俱突吉羅若比丘從非親里尼取衣除貿易尼薩耆波逸提蓮華色比丘尼見一比丘著斃衣起慈愍心脫己所著貴價衣易彼衣自著之來覲佛佛問何著斃衣耶尼以實答佛言汝衣滿足有餘聽施何以故婦人著上衣猶有所嫌況斃衣耶故為制戒後諸比丘俱不敢取親里尼衣故佛更加非親里之言除貿易者因祇林中二部得施衣共分其衣有不宜身者尼持來與比丘換比丘不敢換因白佛佛為開除比丘尼及式叉摩那等犯者俱突吉羅若比丘使非親里尼浣故衣若染若打尼薩耆波逸提因迦留陀夷與偷蘭難陀比丘尼彼此相看出不淨污五衣尼為浣洗事甚猥諸尼嫌之白佛故制後諸比丘不敢使親里尼浣染佛更加非親里之言此中使浣染打者三捨墮使而尼未浣染打者三突吉羅若減一減二倣此推之可見若使非親里尼浣染打新衣者三突吉羅若使非親里式叉摩那沙彌尼浣染染故衣亦突吉羅比丘尼及式叉摩那等犯者俱突吉羅若病無親里尼使非親里尼浣染打若借他衣浣染打者不犯若比丘從非親里居士若居土婦乞衣除餘時尼薩耆波逸提餘時者若比丘奪衣失衣燒衣漂衣是謂餘時舍衛城有一長者與跋難陀友善一日至祇園謁之尊者為説法大歡喜欲有所施尊者却之彼固請云欲何所須尊者云惟當施汝所著衣彼云待明日來我家當相與今入城不可無外飾故尊者言且止我不復須彼不獲已脫衣別去入城時門卒問何無外衣訛言祇園門外被賊劫去聞者譏嫌佛聞故制後諸比丘不敢從親里居士索衣故更加非親里之言除餘時者有比丘夏安居竟來見佛晝熱夜行被賊劫衣裸形入城與比丘借衣見佛故佛開奪衣失衣燒衣漂衣等時也比丘尼犯者罪同式叉摩那等俱突吉羅此方從居士索衣不強取無犯居士自與者亦無犯若比丘奪衣失衣燒衣漂衣若非親里居士居士婦自恣請多與衣是比丘當知足受若過受者尼薩耆波逸提時有多比丘被盜劫去衣赤身至祇園諸居士聞知多持衣來施有他比丘冒取轉與六群比丘佛聞故制自恣請者自發心盡意請問也多與衣者願多施與衣不限取一取二也若失一衣不應取若失二衣餘一衣若是二重三重四重應擲作若三衣俱失應知足受隨居士所與衣受之若衣細薄不牢者可取作二重三重四重當肩上當安緣或貼障垢膩或安鈎鈕過受者捨墮比丘尼犯者罪同式叉摩那等俱突吉羅若比丘居士居士婦為比丘辦衣價買如是衣與某甲比丘是比丘先不受自恣請便到居士家作如是説善哉居士為我辦如是衣價與我為好故若得衣者尼薩耆波逸提跋難陀聞一居士夫婦私議為辦衣價跋難陀以貪好故即至其家囑辦貴價衣居士嫌云我方私議未來恣請何遽至作是説耶佛聞故制得衣犯捨墮不得衣突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若比丘二居士居士婦與比丘辦衣價買如是衣與某甲比丘是比丘先不受自恣請到二居士家作如是説善哉居士辦如是衣價與我共作一衣為好故若得衣者尼薩耆波逸提跋難陀聞二居士家各與辦衣價以貪好故即至二家囑令合作一衣彼意謂二家合作一衣則二家不須增價而我得好衣又可免前罪也二居士交嫌之佛聞并制得衣捨墮不得衣突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若比丘若王若王大臣若婆羅門若居士居士婦遣使為比丘送衣價使至比丘所語言大德今為汝故送是衣價可受取是比丘應語彼使言我不應受此衣價我若須衣合時清淨當受彼使語比丘言大德有執事人不須衣比丘應言有若守僧伽藍民若優婆塞此是比丘執事人彼使詣執事人所與衣價已還到比丘所言大德所示某甲執事人我已與衣價竟大德知時往彼當得衣須衣比丘當往執事人所若二反三反為作憶念應語言我須衣得衣者善若不得衣應四反五反六反在前默然住令彼憶念得衣者善若不得衣過是求得衣者尼薩耆波逸提若不得衣從所得衣價處若自往若遣使往語言汝先遣使送衣價與某甲比丘是比丘竟不得衣汝還取莫使失此是時跋難陀尊者與一大臣友善大臣遣使送衣價與尊者尊者即遣使送一長者收掌之異時大臣問使言前所送衣價曾造衣不使答言未造大臣重遣使問故尊者聞知疾往長者家取價造衣長者適有事出門聞取衣價乃曰少待回時今有約若去遲罰金錢五百尊者固不允長者不得已取衣價與之然後去以遲故罰金錢五百衆皆譏嫌佛知故制我不應受者以佛制比丘不許手受金銀錢等也合時清淨當受者如下文得衣者善是也過求而得捨墮不得突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若比丘雜野蠶綿作臥具尼薩耆波逸提六群作臥具用野蠶綿至養蠶家買蠶家云蠶未熟少待彼比丘日待其傍蠶家以急故日曝蠶繭蠶蛹煩熱作聲居士見之譏嫌佛聞故制成者捨墮未成突吉羅教他作者亦爾為他人作成不成俱突吉羅若僧中捨時應以斧砍碎和泥塗壁及埵比丘尼犯者罪同式叉摩那等俱突吉羅若得已成者不犯若比丘以新純黑羺羊毛作臥具者尼薩耆波逸提毗舍離城諸年少邪淫多欲以純黑羺羊毛作氈被體夜行使人不見六群效之亦以純羺黑羊毛作臥具諸年少見而嫌之云我等好淫故作此比丘亦好淫耶佛聞故制羺羊胡羊也成不成等結罪同上比丘尼及式叉摩那等犯者俱突吉羅若得已成者不犯若比丘作新臥具應用二分純黑羊毛三分白四分牻若比丘不用二分黑三分白四分牻作新臥具者尼薩耆波逸堤六群比丘以純白羊毛作新臥具居士見之譏嫌謂如王如大臣等佛聞故制牻音忙黑白雜色牛也俗本作尨非是今依藏本正之成不成結罪同上比丘尼及式叉摩那等犯者俱突吉羅若得已成者不犯若比丘作新臥具應六年持若減六年不捨故更作新者除僧羯磨尼薩耆波逸提六群比丘多畜臥具不捨故常營新者佛知故制除僧羯磨者時有一病比丘欲有所往以舊具重難持白佛佛為作白二羯磨許重作成不成結罪同上比丘尼及式叉摩那等犯者俱突吉羅若得已成者若捨故更作者不犯若比丘作新坐具當取故者縱廣一磔手揲新者上用壞色故若比丘作新坐具不取故者縱廣一磔手揲新者上用壞色者尼薩耆波逸提佛一日不受請遣諸比丘受請佛常規比丘受請後遍探諸房見故坐具處處狠藉乃制用壞色故者以舊具色壞取揲新者之上則可壞新者之色而舊者亦得所用也成不成結罪同上比丘尼及式叉摩那等犯者俱突吉羅或他人已成者無犯無舊具者亦無犯若比丘行道中得羊毛須者應取若無人持得自持行三由旬若無人持自持過三由旬尼薩耆波逸提跋難陀行路中多得羊毛貫杖頭行俗見譏嫌謂如販羊毛客佛知故制一由旬四十里也無人持自持若過三由旬捨墮若有人持比丘於此中間不得助持助持者突吉羅若令比丘尼式叉摩那沙彌沙彌尼持過三由旬突吉羅除羊毛持他物過三由旬亦突吉羅比丘尼及式叉摩那等犯者俱突吉羅若擔衣帽革屣等無犯若比丘使非親里尼浣染擘羊毛者尼薩耆波逸提六群比丘使憍曇彌比丘尼浣染擘羊毛因覲佛佛見其手黑問故尼以實對因制使非親里尼浣染前已有制今重制擘羊毛擘者分折揀理之也浣染擘俱犯三捨墮犯二則二捨墮犯一則一捨墮使而未浣染擘者三突吉羅餘可知若使非親里式叉摩那沙彌尼者俱突吉羅比丘尼及式叉摩那等犯者俱突吉羅若為病人為衆僧不犯若比丘自手取金銀若錢若教人取若置地受若口可受者尼薩耆波逸提跋難陀到居士家居士以錢買食與難陀難陀不願食秖手索取錢持寄市肆為俗譏嫌佛知故制置地受者因手不受乃令置地受也口可受者雖手未受而口言受也凡施金銀錢等不應手受應送至守園人或優婆塞謂之作淨彼人取已還送比丘當受敕淨人掌之若彼人不還應令餘比丘語言佛教為淨故與汝應還彼比丘物或餘比丘不語者當自往語言佛教為淨故與汝應還我物今可與僧與塔與和尚與阿闍黎等或不聽者可告本主取回莫失彼信施若如是作法者無犯若比丘不語彼人知是看是者突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若為作屋求林木或道路中為糧故持金銀等或令淨人持俱無犯若比丘種種賣買金銀寶物者尼薩耆波逸提跋難陀往市肆上以錢易錢諸居士見之譏曰釋子以錢易錢善能賣買佛知故制易成者捨墮不成者突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若以錢易物為佛法僧者不犯若比丘種種販賣者尼薩耆波逸提跋難陀路行不乞食以生薑易食既去舍利弗來乞食食家索飯價舍利弗云我比丘不易食彼云向者跋難陀尊者來以生薑易食大德何言不易食耶又一外道得貴價衣自念何用此貴衣為當與人貿之遂往祇園適跋難陀打染故衣如新便與易之後知是故衣因返歸跋難陀索其原衣跋難陀不肯相與爭直佛聞故制前條但制金銀寶物此條兼制一切雜物凡出物與俗人相貿易並得此罪易成者捨墮易未成者突吉羅若與出家五衆人貿易者若使淨人貿易者俱不犯若有悔者應還不還者亦捨墮比丘尼犯者罪同式叉摩那等俱突吉羅若比丘畜長鉢不淨施得齊十日若過者尼薩耆波逸提跋難陀多畜鉢居士見之譏嫌佛聞故制後阿難得貴價鉢欲奉大迦葉迦葉因出行未回畜恐有犯往白佛佛問幾時回答云十日佛遂開十日若一日得鉢二日三日又得鉢乃至十日得鉢畜至十一日明相出盡捨墮蓋秪計前一日至十日也若此長鉢不捨將貿易餘鉢者一捨墮一突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若受寄鉢不犯若比丘畜鉢減五綴不漏更求新鉢為好故若得者尼薩耆波逸提彼比丘應往僧中捨展轉取最下鉢與之令持乃至破應持跋難陀鉢破入城至居士家乞鉢居士買與之復多歷居士乞亦得鉢後一日諸居士集在一處偶言及此各説買鉢與跋難陀居士俱嫌之佛聞故制綴者補也凡五綴而不漏亦可受持漏者應別求鉢若不滿五綴又不漏而更求新者犯捨墮滿五綴不漏更求新者突吉羅綴者鐵鉢用錯鐵末以油和之在鐵碗內以鐵鎚熟研方用塞孔即以微火燒之使硬若粗澀以油塗如法熏之若瓦鉢用石末亦如前法又方鐵瓦二鉢有漏者用沙糖和泥塞孔以火乾炙令堅固即不漏也比丘尼犯者罪同式叉摩那等俱突吉羅若他人施者若自價買者不犯若比丘自乞縷線使非親里織師織作衣者尼薩耆波逸提跋難陀欲縫僧伽黎入城乞線仍處處乞以線多故令織三衣自手牽繀督織居士見之譏嫌佛聞故制織師是親里與線者亦親里無犯若織師非親里與線者親里犯若織師親里與線者非親里亦犯若比丘自看織若自織若自作繀者皆突吉羅比丘尼犯者罪同式叉摩那沙彌沙彌尼俱突吉羅若比丘居士居士婦使織師為比丘織作衣彼比丘先不受自恣請便往織師所語言此衣為我作與我極好織令廣大堅緻我當多少與汝價是比丘與價乃至一食直若得衣尼薩耆波逸提一居士持線與織師織衣與跋難陀付線訖即他往難陀即至織師所令好織織師云線少難陀遂往居士家更索線又云價少復云當益汝價居士回問前事居士婦白如上居士因嫌之佛聞故制得衣捨墮不得衣突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若比丘先與比丘衣後嗔恚若自奪若使人奪取還我衣不與汝是比丘應還取衣者尼薩耆波逸提跋難陀有一弟子善能勸化難陀喜之約與同遊因與衣有他比丘私與弟子説難陀非法非律勿可從遊弟子因却之難陀憤奪取所與衣弟子高聲言莫爾莫爾佛聞故制奪衣離本處捨墮未離本處突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若借他衣不還奪取無犯若彼人破戒破見作諸不法事應擯者奪取無犯若比丘畜酥油生酥蜜石蜜齊七日得服若過者尼薩耆波逸提比丘秋月患風疾及瘡疥佛聽許畜五種藥先制不許非時服因病不愈乃許非時服又佛與衆遊摩竭國時畢陵伽婆蹉在此城久住知識多大得供養若酥油等積滿大甕臭穢狼藉居士見之譏嫌佛聞故制凡一日得藥二日又得藥乃至七日又得藥俱當淨施若至八日明相出時俱犯捨墮若以藥轉貿他藥者捨墮加一突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若至七日捨與他比丘食之若未滿七日當還彼比丘用塗腳塗戶響燃燈若過七日酥油塗戶響及腳蜜石蜜與守園人若比丘春殘一月在當求雨浴衣半月應用浴若比丘過一月前求雨浴衣過半月前用浴者尼薩耆波逸提毗舍佉母設齋供佛及僧因遣婢求唱時到時天正大雨佛聽比丘冒雨浴皆裸形雨中婢見之歸白母言祇園無比丘俱是裸形外道母知其故令再請佛即赴請齋畢毗舍佉母請施雨浴衣佛即聽許後六群比丘春夏冬常求雨浴衣轉作餘用仍裸形而浴佛知故制春殘一月在者當此土三月十六日也半月應用浴者當此土四月一日也若先時而求先時而用者皆捨墮應用而不用者突吉羅比丘尼及式叉摩那等犯者俱突吉羅若捨雨浴衣後更作餘用者不犯若無雨浴衣不著而浴者不犯若比丘十日未滿夏三月若有急施衣應受受已乃至衣時應畜若過畜者尼薩耆波逸提時舍衛有民叛違王遣大臣征之大臣欲設供施衣而後往時尚有十日安居未滿諸比丘不敢受衣乃白佛故制急施衣者有事急施不能待至安居竟日也乃至衣時應畜者謂得畜至受衣之日以佛制安居竟日方受衣也過畜即是長衣故犯捨墮比丘尼犯者罪同式叉摩那等俱突吉羅若有賊難及失衣等緣過前受者不犯或受寄衣過後畜者不犯若比丘夏三月安居竟至八月十五日滿已阿蘭若在逈遠有疑恐怖畏難處比丘在如是處住於三衣中若留一一衣置村舍內及有因緣離衣宿乃至六夜若過者尼薩耆波逸提比丘安居後各往阿蘭若處住被賊劫去衣物且被打傷皆來祇園中住故佛制許留一一衣於村舍中離衣而宿後六群比丘遂以三衣寄親友家久遊不歸佛聞更制六夜過六夜至明相出捨墮夏三月安居竟者夏安居以四月十六日始至七月十五日竟也八月十五日滿者西域一年分三時每時四月故至八月十五日夏滿也比丘尼及式叉摩那等犯者俱突吉羅若有事緣拘阻者雖過六夜不犯若比丘知是僧物自回入己者尼薩耆波逸提一居士欲設齋供佛與僧兼施衣跋難陀聞知即往其家語言衆僧俱富不必施衣但施食可也衣可施我居士信之至明日衆僧應供威儀具足居士見之大聲曰悔不與衆僧衣衆問言是難陀之故佛知故制凡僧物不問輕重大小回入己者捨墮若物許僧轉與塔許塔轉與僧許現在轉與十方許十方轉與現在許僧轉與尼許尼轉與僧皆突吉羅若已許疑未許若未許作許想若未許疑已許犯者俱突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若知其許少勸與多許少人勸與多人許惡人勸與善人者無犯不知其許者無犯諸大德我已説三十尼薩耆波逸提法今問諸大德是中清淨不三説諸大德是中清淨默然故是事如是持諸大德是九十波逸提法半月半月説戒經中來波逸提此云墮前三十皆在衣鉢上犯罪故令捨所犯之物以求懺名捨墮今九十但在言行上犯罪無物可捨故直言墮也若比丘知而妄語者波逸提因象力比丘與諸梵志論議設不如時便自違反前語於衆僧中問亦復違反前語為衆所呵佛知故制知而妄語者謂不見言見見言不見不聞言聞聞言不聞不觸言觸觸言不觸不知言知知言不知乃至不疑言疑疑言不疑等於衆中言而了了者波逸提不了了者突吉羅説戒時乃至三問憶念有罪而不説者突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅或有方便為作利益而言者不犯若比丘種髏毀訾比丘者波逸提因六群斷事以種髏罵諸比丘使諸比丘慚愧忘前失後不得語佛聞故制種髏毀訾者或言其種姓之卑劣或言其伎術之鄙陋或言其多犯罪惡等語而了了者波逸提不了了者突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅或失口説者或為親厚故説者或為教授故説者或為法為律故説者俱不犯若比丘兩舌語者波逸提因六群傳此屏處語向彼説復傳彼屏處語向此説由是衆中未有鬪諍而生鬪諍已有鬪諍不得除滅佛聞故制比丘兩舌鬪亂在家出家一切衆中説而了了者波逸提不了了者突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若破惡知識破惡伴黨破方便壞僧者破非法非律羯磨者俱不犯若比丘與女人同室宿者波逸提阿那律尊者因遠行至無僧住處入村覔宿惟一淫女家常宿客尊者往求宿淫女令住門下屋繼而一長者亦來求宿彼長者僕從多逼近尊者淫女乃令進己房宿尊者入房敷臥具跏趺而坐初夜女淫心起來尊者邊求成婦事尊者默然不答至後夜亦如是女便脫衣近之尊者涌身空中女慚愧懺謝尊者還本座為其説法女求授歸戒明日回白佛故制女人同室宿者隨脅著地波逸提隨轉側波逸提晝日婦人立比丘臥者突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若婦女與比丘前後至總不知者不犯或病臥不能起或為事難所狗者不犯若比丘與未受大戒人共宿過二夜至三夜曉者波逸提六群中一人與諸長者在講堂共宿放意熟睡轉側露形鄰比丘以衣覆之少時復露鄰比丘復以衣覆之尋復轉側而形起諸長者大笑調弄時諸比丘皆慚愧佛聞故制時羅睺羅未受大戒為衆遣出無所容乃往廁中宿佛知往廁中引歸己房共宿一夜乃更制共二宿若至三宿明相未出當避去不避去者波逸提比丘尼犯者罪同式叉摩那等俱突吉羅若未受大戒人與比丘先後至總不知者不犯若行若立若坐若病臥或為事難所拘者不犯若比丘與未受大戒人共誦者波逸提六群與諸長者共在講堂誦佛經語聲高大如婆羅門讀書聲亂諸坐禪者因白佛故制共誦者謂兩人共誦一句不前不後者犯波逸提比丘尼犯者罪同式叉摩那等俱突吉羅凡誦者必一人説竟一人方説師若不教言我説竟汝方説者師得突吉羅若二人同業同誦者不犯若比丘知他比丘有粗惡罪向未受大戒人説除僧羯磨波逸提時有比丘行波利婆沙摩那埵在下行坐六群比丘語白衣言汝等知如許人在下行坐者不白衣報言不知六群語言此等犯如是事如是事故衆僧罰使下行坐諸比丘聞之慚愧白佛故制粗惡罪者波羅夷僧伽婆尸沙也説了了者波逸提不了了者突吉羅除粗惡罪若以餘罪向未受大戒人説者突吉羅自犯粗惡罪向未受大戒人説者突吉羅除僧羯磨者爾時舍利弗為衆作羯磨差往王衆中臣民衆中説調達過惡聞佛制戒疑犯此罪故佛為除之比丘尼犯者罪同式叉摩那等俱突吉羅若白衣先已顯聞此粗惡罪者不犯若比丘向未受大戒人説過人法言我知是我見是知見實者波逸提婆裘園比丘向人説得過人法佛言真實得者猶不得向人説況不實耶乃制戒過人法者謂過出五陰六入十八界之法即禪定智慧解脫等法也知見實者謂實知實見非虗誑也説而了了者波逸提不了了者突吉羅若作手印若書信若作相令彼知者波逸提不知者突吉羅若向受大戒人非同意者説突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若增上慢若實得向同意比丘説或但説過人法而不言我得俱無犯若比丘與女人説法過五六語除有知男子波逸提迦留陀夷詣一長者家在姑前與婦耳語姑怪問婦云與我説法姑云若説法當高聲説令我等聞云何乃耳中獨語耶佛聞故制説法過五六語五語謂五蘊無我六語謂六根無常若有智男子在傍則雖過不犯過而了了者波逸提不了了者突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若説五戒八關齋八聖道十善道十不善道及問疑義雖無知男子得為説若不解得為廣説俱不犯若比丘自手掘地教人掘地者波逸提六群為佛修治講堂自手掘地又教人掘地言掘是置是長者見而譏嫌佛知故制掘地但動土即波逸提若打橛入地若地上燃火俱波逸提若使淨人掘地應言知是看是不教者突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若曳竹木動土若取牛糞取崩岸土鼠壤土若除經行處土若除屋內土若杖築地若不故掘一切不犯若比丘壞鬼神村者波逸提曠野比丘修治屋舍自手砍樹佛聞故制鬼神村者一切草木是以草木為鬼神之所棲故名村若砍伐則壞其村而無所捿也凡一切草木若生作生想自伐教人伐或樹上打橛乃至火燒盡波逸提若斷多分生草木波逸提若生作非生想若非生作生想或疑生或疑非生皆突吉羅半生半枯者突吉羅若使淨人伐不教知是看是者突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若斷枯草木若于草木上曳竹木等無犯若比丘妄作異語惱他者波逸提闡陀比丘有罪諸比丘問之即以餘語答言汝向誰説為説何事為論何理為我説為餘人説誰人犯罪罪由何生我不見罪佛知令作單白羯磨名異語後闡陀因佛制不得作異語便觸惱衆僧喚來不來不喚來便來應起不起不應起便起應語不語不應語便語佛知更為作單白羯磨名觸惱若未白前犯者突吉羅已白後犯者波逸提比丘尼犯者罪同式叉摩那等俱突吉羅若重聽不解前語者或小語疾語不解者或作非法事者乃至種種事難喚不來等不犯若比丘嫌罵者波逸提沓婆摩羅子為僧知臥具及差僧受食時慈地比丘於屏處譏其有愛憎心衆諫之即報言我不面説但屏處譏嫌耳佛知為制嫌責後猶嫌之不已衆又諫之即報言我不嫌但罵耳故佛更制嫌罵説而了了波逸提不了了突吉羅若受教罵者突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若比丘實有如是惡如法發露令他悔者不犯若比丘取僧繩床木床臥具坐褥露地敷若教人敷捨去不自舉不教人舉波逸提十七群比丘取僧坐具在露地敷坐至食時到不收坐具便往赴齋坐具為風塵土坌蟲鳥汙穢佛知故制言取僧者凡物已捨入僧謂之僧物乃大衆常住之物也若取僧繩床等露地敷去時當舉向知事人及餘比丘或舉著不破壞處若竟去不舉者波逸提若去一足在門內一足在門外未去者突吉羅若二人共坐一繩床下座當收而下座擬上座收上座亦擬下座收卒二俱不收俱波逸提下座以非威儀加突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若有事難不能收者不犯十七群者羅閲城有諸童子自十二至十七歲同來出家自為一群也若比丘於僧房中敷臥具若自敷若教人敷若坐若臥去時不自舉不教人舉波逸提有客比丘來在邊房中敷臥具宿後去不收亦不語舊住比丘致具爛壞佛聞故制凡客去當語知事人或無人可舉置不壞處若竟去不收者出界外波逸提若一腳界內一腳界外未去者突吉羅若有事急出不即還二宿在界外至第三宿明相未出時當自往還房中舉或遣人來語知事人令掌護若不爾者波逸提比丘尼犯者罪同式叉摩那等俱突吉羅若為事難所拘者不犯若比丘知先比丘住處後來強於中間敷臥具止宿念言彼若嫌迮者自當避我去作如是因緣非餘非威儀波逸提六群與十七群同道行至無僧住處十七群語六群言汝等上座應先求住處六群答言汝自去我何預汝事十七群即先往求住處敷臥具六群後來倚上座臘而爭次第十七群不肯六群遂於中間敷臥具十七群高聲言諸尊莫爾諸尊莫爾佛聞故制比丘尼犯者罪同式叉摩那等俱突吉羅若先不知者若寬廣不相礙者若病倒地若為事難所拘不犯若比丘嗔他比丘不喜僧房舍內若自牽出若教人牽出波逸提六群與十七群同道行至小住處十七群亦如前語六群六群亦不理十七群先往灑掃房舍敷好臥具六群知已抵暮而入爭其次第令彼移去十七群不肯移遂嗔強牽出房佛聞故制隨所牽人多少隨出戶多少波逸提若牽多人出多戶多人出一戶一人出多戶俱多波逸提若牽一人出一戶一波逸提若持他物出著戶外突吉羅若閉他著戶外突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若未受大戒人共宿至三夜明相未出時牽出者若破戒破見破威儀為他所舉為他所擯者牽出俱無犯知是黃門二根人牽出亦無犯若比丘若房若重閣上脫腳繩床木床若坐若臥波逸提比丘在重閣上住坐脫腳床缺於安詳床腳脫打閣下比丘至令身血出佛聞故制脫腳床者床腳可脫下者也比丘尼犯者罪同式叉摩那等俱突吉羅若坐非脫腳者不犯若比丘知水有蟲若自澆泥若草若教人澆者波逸提闡陀比丘起大房屋以蟲水澆泥諸長者以無慈損生嫌之佛聞故制若蟲水有蟲想波逸提蟲水疑無蟲突吉羅無蟲水有蟲想突吉羅無蟲水疑有蟲突吉羅若酪漿若酒若醋若漬麥漿若有蟲者用澆泥草若教人俱波逸提比丘尼犯者罪同式叉摩那等俱突吉羅若蟲水當用細疊作囊漉過取用無犯若漉囊三重而更有蟲者此處僧不應住以傷生重故若比丘作大房舍戶扇窗牖及餘莊飾具指授覆苫齊二三節若過波逸提闡陀比丘作大房舍覆有餘草復更重覆屋上重故遂至摧折諸居士見之譏嫌佛聞制戒凡覆屋至第三節未竟時便當去到不見不聞處若不去者波逸提若捨見處至聞處捨聞處至見處俱突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若有事難所拘不能至不見不聞處者不犯若比丘僧不差教授比丘尼者波逸提六群比丘教授比丘尼不説正法但説世諦雜事大愛道比丘尼來白佛佛言今當僧中擇堪教授比丘作白二羯磨差往教授比丘尼六群不得差便出界外更互相差教授比丘尼大愛道重來白佛佛乃制戒僧差者應作白云大德僧聽若僧時到僧忍聽差某甲比丘教授比丘尼白如是大德僧聽此某甲比丘教授比丘尼誰諸長老忍僧差某甲比丘教授比丘尼者默然誰不忍者説僧已忍差某甲比丘教授比丘尼竟僧忍默然故是事如是持若比丘為僧差教授比丘尼乃至日暮者波逸提難陀尊者為衆所差教授比丘尼尊者説法好音聲尼衆樂聞遂至日暮時尼衆出祇園往舍衛城城閉已閉不得入即依門外城塹中宿晨旦開門入城諸長者見之皆言尼在祇園中宿佛聞故制凡教授尼應日未暮便止至日暮者波逸提若為餘婦女誦經受經若問餘事至日暮者突吉羅若日暮作不日暮想者突吉羅若在他處為衆説法尼來聽者不犯若比丘語比丘如是言比丘為飲食故教授比丘尼者波逸提六群比丘不得差教授比丘尼便生嫉妬謗諸教授者無有真實但為飲食佛聞故制説而了了者波逸提説而不了了者突吉羅比丘尼及式叉摩那等犯者俱突吉羅若其事實爾者無犯若比丘與非親里比丘尼衣除貿易波逸提有一比丘乞食威儀具足尼見起敬數數請彼彼不受請一日祇園分衣比丘得衣出門適尼至比丘以衣與之意在酬彼前敬料尼必不受尼竟受之比丘數數告人責此尼不當受我衣佛聞故制後比丘不敢與親里尼衣故佛加非親里之言又祇園得衣二部共分或尼得僧衣持來貿易僧不敢易故更加除貿易也比丘尼及式叉摩那等俱突吉羅若比丘與非親里比丘尼作衣者波逸提迦留陀夷為比丘尼作衣乃為作男女行淫像及尼來取即襞衣與之語言此衣不得妄解披著亦莫示人若受請白時到當著此衣在尼後行尼一如所教諸居士見皆譏笑佛聞故制若為尼作衣隨裁多少一針一線皆波逸提若為尉治續線等突吉羅後諸比丘不敢為親里尼作衣白佛故加非親里之言比丘尼及式叉摩那等犯者俱突吉羅若比丘與比丘尼在屏處坐者波逸提迦留陀夷一日往至偷蘭難陀比丘尼所共在門外屏處同坐居士見之譏嫌佛知制戒屏處者有所隱蔽之處可以容私故犯波逸提若盲而不聾若聾而不盲突吉羅若立住者突吉羅比丘尼及式叉摩那等犯者俱突吉羅若比丘與比丘尼共期同道行乃至村間除餘時波逸提餘時者伴行有疑恐怖處是謂餘時六群比丘與六群比丘尼同遊人間諸居士見之譏嫌佛知制戒若期同道行至村間分齊處隨界多少皆波逸提若無村空處行至十里波逸提若減十里突吉羅若多村同一界行突吉羅若期往而未往者突吉羅比丘尼及式叉摩那等犯者俱突吉羅後有比丘不敢與尼同行尼在後行被賊劫佛乃開餘時餘時者謂有大伴行處或疑有賊盜處或實有賊盜恐怖處皆許同道行不犯又不期而同行者亦不犯若比丘與比丘尼同乘一船上水下水除直渡者波逸提六群比丘與六群比丘尼同乘一船上水下水居士見之譏嫌佛知制戒若入船俱波逸提若一腳上船一腳在地欲入而未入者突吉羅若期共往而未往者突吉羅比丘尼及式叉摩那等犯者俱突吉羅除直渡者後因比丘與尼俱欲渡恆河比丘不肯與尼同渡尼不得渡在岸邊被劫故佛開除直渡若不期而同船者不犯或有事難者不犯若比丘知比丘尼讚嘆教化因緣得食食除施主先有意波逸提有一居士請舍利弗目犍連齋適偷蘭難陀比丘尼來彼家問請誰報言請舍利弗目犍連尼言此盡是下賤人若先語我當為請龍中之龍士問龍中龍是誰尼乃舉六群比丘頃舍利弗等至尼便言龍中龍已至居士遂呵責言何前言下賤人後言龍中龍今後不許復來我家蓋此尼實為六群勸化取供養者也舍利弗等歸白佛故制後有長者先有意供養黎師達及黎師達到有尼報知長者乃設齋黎師達聞知是尼報不敢食白佛佛為開除凡知是尼教化者波逸提疑是尼教化者突吉羅不教化教化想突吉羅不教化疑教化突吉羅教化得襯體衣燈油等突吉羅比丘尼及式叉摩那等犯者俱突吉羅若不知若比丘尼自作供養若施主令尼經營俱不犯若比丘與婦女共期同道行乃至村間波逸提毗舍離國女嫁與舍衛國人一日與姑共諍逃回本國道遇阿那律求同行阿那律許之遂同行後其夫追至語言何故將我婦逃走遂打阿那律幾死佛聞制戒共期同行隨衆多界分齊一一波逸提若無村空處行十里波逸提若減十里突吉羅共村里一界共行者突吉羅比丘尼及式叉摩那等犯者俱突吉羅若先不共期若事須往彼得安隱若為勢力所持俱無犯若比丘施一食處無病比丘應受一食若過者波逸提有村中無僧住處諸居士為比丘作住處往來者常聽一食六群比丘到彼得食遂數數受食不去居士譏嫌佛聞制戒後舍利弗有病一食強行病遂增劇佛乃開病比丘若無病而過受食咽咽波逸提食已更受襯衣燈油等加突吉羅比丘尼犯者罪同式叉摩那等俱突吉羅若施主留食或明日受彼人食或道路上有阻或為勢力所持者無犯若比丘展轉食除餘時波逸提餘時者病時施衣時是謂餘時佛同千二百五十人遊行阿那頻頭國有沙䨲婆羅門以車載飲食隨佛後行俟無供日設供隨日既久無有缺供之日乃見阿難道其本意言今供不及設離家日久欲將車載飲食布在道中乞佛及僧腳踏而過即為供養阿難止之為白佛佛聽清旦作粥供衆使食後受請時婆羅門復以酥油餅供衆佛俱聽受後諸居士聞知各送粥及餅有一大臣設食請僧諸人先食美粥已飽到大臣家不能多食大臣嫌之佛為制不許食稠粥然後赴請又一樂師請食時正節會日諸人持飯乾餅等至祇園供僧僧食已飽往樂師家受請不能多食樂師亦嫌之佛乃制戒若僧次請或別請其日偶有二處請當捨一與他比丘自受一處若不捨而展轉食者波逸提若不捨前請而受後請者波逸提若不捨後請而受前請者突吉羅後有病比丘不能一食飽再食恐犯展轉食又有一居士欲設供施衣其日已有先請二俱白佛佛為開之施衣時者僧自恣竟無迦絺那衣一月有迦絺那衣五月也比丘尼犯者罪同式叉摩那等俱突吉羅
