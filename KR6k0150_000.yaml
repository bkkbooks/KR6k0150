front:
  text: 四分戒本約義序昔庚辰歲予在杭之真寂欲效顰圭峯挈毗尼之要以示晚學卒以病阻迨今春自鼓山來寶善謝絕參請但弘唱毗尼而已諸人以戒本請註作新戒方便予曰此宿志也故諾之發筆於仲秋初旬輟筆於孟冬末旬凡三閱月三脫稿而後成其中若事若義悉採之四分律藏所有開遮亦悉本佛制非敢妄以意裁也嗚呼是書之成乃在今日也耶今當此乾坤鼎革之際草昧未寧之秋白刃凌空橫尸遍野居民逃奔山谷旦夕莫必其命而予乃力疾作此何哉蓋以人知世運之變其苦為甚而不知法運之變其苦為尤甚世運之變苦在一時法運之變苦在萬劫一時之苦禍止殺身萬劫之苦禍極三途以此較彼豈百千萬億能及其一哉但人見已然不能見未然故於此則驚惶失措於彼則怡然苟安也予慨自天啟以來耆德凋喪晚進日趨日下如狂瀾之莫迴且又妄逞空見弁髦戒律不有防之後將安極予所以孳孳亟亟勉成此書未敢以世難阻也但思行此書於今之世正如鼓瑟於齊王之門不鄙而嗤之則幸矣況敢望其依而習之乎雖然此亦告朔之羊也或存或去是在仁者旹歲次丙戌冬一陽月朔旦嗣曹洞正宗沙門元賢題於劒津之寶善菴四分戒本約義目錄卷一戒經序四波羅夷法十三僧伽婆尸沙法二不定法卷二三十尼薩耆波逸提法九十波逸提法卷三九十波逸提之餘四波羅提提舍尼法卷四眾學法七滅諍法七佛偈迴向頌目錄終
