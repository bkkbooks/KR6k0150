body:
  text: 四分戒本約義序昔庚辰歲豫在杭之真寂欲效顰圭峯挈毗尼之要以示晚學卒以病阻逮今春自鼓山來寶善謝絶參請但弘唱毗尼而已諸人以戒本請注作新戒方便豫曰此宿志也故諾之發筆於仲秋初旬輟筆於孟冬末旬凡三閲月三脫稿而後成其中若事若義悉採之四分律藏所有開遮亦悉本佛制非敢妄以意裁也嗚呼是書之成乃在今日也耶今當此乾坤鼎革之際草昧未寧之秋白刃凌空橫尸遍野居民逃奔山谷旦夕莫必其命而豫乃力疾作此何哉蓋以人知世運之變其苦為甚而不知法運之變其苦為尤甚世運之變苦在一時法運之變苦在萬劫一時之苦禍止殺身萬劫之苦禍極三途以此較彼豈百千萬億能及其一哉但人見已然不能見未然故於此則驚惶失措於彼則怡然苟安也豫慨自天啓以來耆德凋喪晚進日趨日下如狂瀾之莫回且又妄逞空見辨髦戒律不有防之後將安極豫所以孳孳亟亟勉成此書未敢以世難阻也但思行此書於今之世正如鼓瑟於齊王之門不鄙而嗤之則幸矣況敢望其依而習之乎雖然此亦告朔之羊也或存或去是在仁者時歲次丙戌冬一陽月朔旦嗣曹洞正宗沙門元賢題於劒津之寶善菴四分戒本約義目録卷一戒經序四波羅夷法十三僧伽婆尸沙法二不定法卷二三十尼薩耆波逸提法九十波逸提法卷三九十波逸提之餘四波羅提提舍尼法卷四衆學法七滅諍法七佛偈回向頌目録終
